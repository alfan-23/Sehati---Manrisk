        const getTingkat = (skor) => {
            if (skor >= 20) return { label: 'SANGAT TINGGI', color: 'bg-red-600 text-white' };
            if (skor >= 15) return { label: 'TINGGI', color: 'bg-orange-500 text-white' };
            if (skor >= 8) return { label: 'SEDANG', color: 'bg-yellow-400 text-slate-900' };
            if (skor >= 4) return { label: 'RENDAH', color: 'bg-green-500 text-white' };
            return { label: 'SANGAT RENDAH', color: 'bg-blue-500 text-white' };
        };

        const generateKode = (kategori, index) => `${kategori ? kategori.substring(0, 3).toUpperCase() : 'RSK'}-${String(index).padStart(2, '0')}`;

        // Menggunakan Active Model dari Cek API
        const callGeminiJson = async (prompt, schemaFormat, userApiKey, activeModelName) => {
            if (!userApiKey) throw new Error("API Key belum terhubung dengan Portal.");
            
            // Cegah error 404 saat tombol diklik tapi model masih loading
            let modelToUse = 'gemini-1.5-flash';
            if (activeModelName && !activeModelName.includes('Mengecek') && !activeModelName.includes('Error') && !activeModelName.includes('Kosong')) {
                modelToUse = activeModelName;
            }
            
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${userApiKey}`;
            const fullPrompt = `TUGAS: Anda adalah asisten pakar Manajemen Risiko Fasyankes. Berikan hasil HANYA dalam format JSON valid tanpa penjelasan apapun.\n\nSKEMA JSON:\n${JSON.stringify(schemaFormat, null, 2)}\n\nPERINTAH:\n${prompt}`;
            
            let delay = 1000;
            for (let retry = 0; retry < 3; retry++) { 
                try {
                    const response = await fetch(url, { 
                        method: 'POST', 
                        headers: { 'Content-Type': 'application/json' }, 
                        body: JSON.stringify({ contents: [{ parts: [{ text: fullPrompt }] }] })
                    });
                    
                    if (!response.ok) {
                        if (response.status === 429) {
                            window.parent.postMessage({ type: 'API_ERROR', code: 429 }, '*');
                            throw new Error("Server sibuk. Rotasi API otomatis berjalan.");
                        }
                        if (response.status === 400) throw new Error("API Key tidak valid.");
                        throw new Error(`HTTP Error ${response.status}`);
                    }
                    
                    const data = await response.json();
                    let cleanJson = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
                    const start = Math.max(cleanJson.indexOf('{'), cleanJson.indexOf('['));
                    const end = Math.max(cleanJson.lastIndexOf('}'), cleanJson.lastIndexOf(']'));
                    if(start !== -1 && end !== -1) cleanJson = cleanJson.substring(start, end + 1);
                    
                    return JSON.parse(cleanJson); 
                } catch (e) {
                    if (retry === 2) throw e;
                    await new Promise(res => setTimeout(res, delay)); delay *= 2; 
                }
            }
        };

        function App() {
            const [step, setStep] = useState(1);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [toast, setToast] = useState("");
            const [apiKey, setApiKey] = useState(() => sessionStorage.getItem('sehati_api_key') || '');
            const [activeModel, setActiveModel] = useState('Memuat...');
            const fileInputRef = useRef(null);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 5000); };
            const handlePrint = () => { showToast("Menyiapkan dokumen..."); setTimeout(() => { window.print(); }, 1000); };
            const isKlinis = (kat) => kat === 'Klinis / Keselamatan Pasien';

            // FUNGSI CEK API KEY (Sama seperti IMP)
            const verifyKey = async () => {
                if (!apiKey) { 
                    setActiveModel("API Key Kosong"); 
                    showToast("⚠️ Menunggu sinkronisasi API Key dari Portal."); 
                    return; 
                }
                setActiveModel("Mengecek koneksi...");
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    if (!res.ok) throw new Error("Key tidak valid");
                    const data = await res.json();
                    const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent") && m.name.includes("gemini"));
                    // Cari model terbaik yang tersedia
                    let selected = validModels.find(m => m.name.includes('1.5-flash')) || validModels.find(m => m.name.includes('flash')) || validModels[0];
                    setActiveModel(selected.name.replace('models/', ''));
                    showToast("✅ API Key Valid & Siap Digunakan!");
                } catch (e) {
                    setActiveModel("Error Koneksi API");
                    showToast("❌ Gagal terhubung dengan server AI.");
                }

            // Otomatis cek key saat pertama kali dimuat
            useEffect(() => {
                if (apiKey) verifyKey();

                    analisa: { pengendalian: 'SOP Manual Cadangan', d: 3, k: 3, b: 5, skor: 9, tingkat: 'SEDANG' },
                    evaluasi: { selera: 'Diatas selera risiko', perluPenanganan: 'Ya' },
                    rca: { w1: 'Server overload', w2: 'Kapasitas server kecil', w3: 'Anggaran upgrade belum turun', w4: '', w5: '', akar: 'Keterbatasan anggaran infrastruktur IT', jenis: 'Machine/Money' },
                    rtp: { opsi: 'Reduksi kerugian', biaya: 'Retensi', uraian: 'Pengajuan revisi anggaran BLUD', waktu: '1 bulan', rd: 2, rk: 2, rb: 5, rskor: 4, rtingkat: 'RENDAH', pemilik: 'PJ Mutu', pengelola: 'Tim IT' },
                    monitoring: { realisasi: 'Proposal diajukan', hambatan: 'Menunggu persetujuan', usulan: 'Audiensi Dinkes', md: 2, mk: 2, mb: 5, mskor: 4, mtingkat: 'RENDAH', mselera: 'Dibawah selera risiko', trend: 'Turun', efektivitas: 'Efektif' },
                    aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []
                }
            ]);

            const [printFormType, setPrintFormType] = useState('SEMUA');

            const handleSaveDraft = () => {

                a.download = `draft-simr-${profil.tanggal}.txt`; a.click(); showToast("✅ Draft berhasil disimpan.");
            };
            const handleLoadDraft = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.profil) setProfil(data.profil); if (data.konteks) setKonteks(data.konteks); if (data.risiko) setRisiko(data.risiko);
                        showToast("✅ Draft berhasil dimuat.");
                    } catch (error) { showToast("❌ File rusak."); }
                }; reader.readAsText(file); e.target.value = ""; 
            };

            const updateRisiko = (id, path, value) => {
                setRisiko(prev => prev.map((r, index) => {
                    if (r.id !== id) return r;
                    const newR = JSON.parse(JSON.stringify(r)); 
                    const parts = path.split('.'); let curr = newR;
                    for (let i = 0; i < parts.length - 1; i++) curr = curr[parts[i]];
                    curr[parts[parts.length - 1]] = value;

                    if (path === 'kategori') {
                        newR.identifikasi.kode = generateKode(value, index + 1);
                        if(isKlinis(value)) newR.analisa.b = 1; 
                    }

                    let skorChanged = false;
                    if (path.includes('analisa')) {
                        newR.analisa.skor = (parseInt(newR.analisa.d) || 0) * (parseInt(newR.analisa.k) || 0);
                        newR.analisa.tingkat = getTingkat(newR.analisa.skor).label;
                        newR.evaluasi.selera = newR.analisa.skor >= 8 ? "Diatas selera risiko" : "Dibawah selera risiko";
                        newR.evaluasi.perluPenanganan = newR.analisa.skor >= 8 ? "Ya" : "Tidak";
                        skorChanged = true;
                    }
                    if (path.includes('rtp') && (path.includes('rd') || path.includes('rk'))) {
                        newR.rtp.rskor = (parseInt(newR.rtp.rd) || 0) * (parseInt(newR.rtp.rk) || 0);
                        newR.rtp.rtingkat = getTingkat(newR.rtp.rskor).label;
                        skorChanged = true;
                    }

                    if (skorChanged && newR.analisa.skor > 0 && newR.rtp.rskor > 0) {
                        if (newR.rtp.rskor < newR.analisa.skor) { newR.monitoring.trend = "Turun"; newR.monitoring.efektivitas = "Efektif"; }
                        else if (newR.rtp.rskor === newR.analisa.skor) { newR.monitoring.trend = "Tetap"; newR.monitoring.efektivitas = "Sebagian Efektif"; }
                        else { newR.monitoring.trend = "Naik"; newR.monitoring.efektivitas = "Tidak Efektif"; }
                    }
                    return newR;
                }));
            };

            const tambahRisiko = () => {
                setRisiko([...risiko, {
                    id: Date.now(), idKonteks: '', kategori: '', area: '',
                    identifikasi: { sumber: '', sebab: '', kode: '', risiko: '', dampak: '', pernyataan: '' },
                    analisa: { pengendalian: '', d: 1, k: 1, b: 1, skor: 1, tingkat: 'SANGAT RENDAH' }, evaluasi: { selera: 'Dibawah selera risiko', perluPenanganan: 'Tidak' },
                    rca: { w1: '', w2: '', w3: '', w4: '', w5: '', akar: '', jenis: '' },
                    rtp: { opsi: '', biaya: '', uraian: '', waktu: '', rd: 1, rk: 1, rb: 1, rskor: 1, rtingkat: 'SANGAT RENDAH', pemilik: 'PJ Mutu', pengelola: '' },
                    monitoring: { realisasi: '', hambatan: '', usulan: '', trend: 'Tetap', efektivitas: '' }, aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []
                }]);
            };

            const handleAIGoals = async (cId) => {
                const c = konteks.find(x => x.id === cId);
                if(!c.rincian) return showToast("⚠️ Pilih 'Rincian Unit' ILP terlebih dahulu.");
                showToast("⚡ AI sedang merangkum pilihan sasaran...");
                try {
                    const res = await callGeminiJson(`Berikan 3 variasi Tujuan dan Sasaran Mutu Kinerja untuk kegiatan "${c.rincian}" Puskesmas.`, { options: [{ tujuan: "string", sasaran: "string" }] }, apiKey, activeModel);
                    setKonteks(konteks.map(x => x.id === cId ? { ...x, aiGoalOptions: res.options } : x));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIGenerateRisks = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.idKonteks || !r.kategori) return showToast("⚠️ Pilih 'Konteks Unit' & 'Kategori Risiko'.");
                const c = konteks.find(ctx => ctx.id === r.idKonteks);
                showToast("⚡ AI menyusun opsi identifikasi risiko...");
                try {
                    const panduan = isKlinis(r.kategori) ? "Klinis b=1." : "Non-Klinis b=1-5.";
                    const res = await callGeminiJson(`Buat 3 opsi risiko KHUSUS kategori "${r.kategori}" kegiatan "${c.rincian}". \n${panduan}`, { options: [{ sumber: "Internal/Eksternal", sebab: "string", risiko: "string", dampak: "string", pernyataan: "Sebab->Risiko->Dampak", d: "1-5", k: "1-5", b: "1-5", pengendalian: "string" }] }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRiskOptions: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const applyAiRiskOption = (rId, opt) => {
                setRisiko(prev => prev.map((r, index) => {
                    if (r.id !== rId) return r;
                    const newR = JSON.parse(JSON.stringify(r));
                    newR.kategori = opt.kategori || newR.kategori; newR.identifikasi.kode = generateKode(newR.kategori, index + 1);
                    newR.identifikasi.sumber = opt.sumber; newR.identifikasi.sebab = opt.sebab; newR.identifikasi.risiko = opt.risiko; newR.identifikasi.dampak = opt.dampak; newR.identifikasi.pernyataan = opt.pernyataan; newR.analisa.pengendalian = opt.pengendalian;
                    newR.analisa.d = opt.d; newR.analisa.k = opt.k; newR.analisa.b = isKlinis(newR.kategori) ? 1 : (opt.b || 5);
                    newR.analisa.skor = (parseInt(opt.d) || 0) * (parseInt(opt.k) || 0);
                    newR.evaluasi.selera = newR.analisa.skor >= 8 ? "Diatas selera risiko" : "Dibawah selera risiko";
                    newR.evaluasi.perluPenanganan = newR.analisa.skor >= 8 ? "Ya" : "Tidak";
                    newR.aiRiskOptions = []; return newR;
                }));
            };

            const handleAIRCA = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.identifikasi.pernyataan) return showToast("⚠️ Pernyataan Risiko kosong!");
                showToast("⚡ AI membedah akar masalah (5-Why)...");
                try {
                    const res = await callGeminiJson(`Lakukan RCA mendalam 5-Why untuk risiko: "${r.identifikasi.pernyataan}". Gali kegagalan sistemik/kebijakan.`, { rca: { w1: "string", w2: "string", w3: "string", w4: "string", w5: "string", akar: "string", jenis: "Man/Money/Material/Method/Machine" } }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, rca: res.rca } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIRTP = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.rca.akar) return showToast("⚠️ Lakukan RCA dahulu!");
                showToast("⚡ AI menyusun opsi saran penanganan (RTP)...");
                try {
                    const res = await callGeminiJson(`Beri 3 saran rencana penanganan efektif (RTP) mengatasi akar masalah: "${r.rca.akar}".`, { options: [{ opsi: "Pilih: Reduksi/Transfer/Hindari", biaya: "Retensi/Transfer", uraian: "string", waktu: "string", rd: "1-5", rk: "1-5", pemilik: "Jabatan" }] }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRtpOptions: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const applyAiRtpOption = (rId, opt) => {
                setRisiko(prev => prev.map((r) => {
                    if (r.id !== rId) return r;
                    const newR = JSON.parse(JSON.stringify(r));
                    newR.rtp = { ...newR.rtp, ...opt }; newR.rtp.rskor = (parseInt(opt.rd) || 0) * (parseInt(opt.rk) || 0);
                    if (newR.analisa.skor > 0 && newR.rtp.rskor > 0) {
                        newR.monitoring.trend = newR.rtp.rskor < newR.analisa.skor ? "Turun" : newR.rtp.rskor === newR.analisa.skor ? "Tetap" : "Naik";
                        newR.monitoring.efektivitas = newR.rtp.rskor < newR.analisa.skor ? "Efektif" : newR.rtp.rskor === newR.analisa.skor ? "Sebagian Efektif" : "Tidak Efektif";
                    }
                    newR.aiRtpOptions = []; return newR;
                }));
            };

            const handleAIMonitoring = async (rId, phase) => {
                const r = risiko.find(x => x.id === rId);
                showToast(`⚡ AI menyusun opsi ${phase}...`);
                try {
                    let p = phase === 'Realisasi' ? `3 tindakan nyata untuk rencana: "${r.rtp.uraian}".` 
                          : phase === 'Hambatan' ? `3 hambatan saat merealisasikan: "${r.monitoring.realisasi}".` 
                          : `3 usulan mengatasi hambatan: "${r.monitoring.hambatan}".`;
                    const res = await callGeminiJson(p, { options: [{ teks: "string" }] }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, [`ai${phase}Options`]: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            return (
                <div className="flex min-h-screen">
                    {toast && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold border border-emerald-500 animate-pulse">{toast}</div>}
                    
                    <aside className={`no-print ${isSidebarOpen ? 'w-72' : 'w-20'} bg-slate-900 text-slate-400 transition-all duration-300 flex flex-col h-screen sticky top-0 shrink-0 z-50`}>
                        <div className="p-6 text-white font-black text-xl flex items-center gap-3 border-b border-slate-800 relative">
                            <div className="bg-emerald-500 p-2 rounded-lg text-slate-900"><Icon name="BrainCircuit" /></div>
                            {isSidebarOpen && <span className="uppercase">SIMR AI PRO</span>}
                        </div>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="absolute -right-3 top-20 bg-emerald-500 text-white p-1 rounded-full border-2 border-white z-10"><Icon name={isSidebarOpen ? "ChevronLeft" : "ChevronRight"} className="w-4 h-4" /></button>
                        
                        <nav className="flex-1 px-3 py-6 space-y-2 overflow-y-auto">
                            {[
                                { id: 1, label: 'Konteks ILP', icon: 'Building2' },
                                { id: 2, label: 'Register (Form 1)', icon: 'AlertTriangle' },
                                { id: 3, label: 'Akar Masalah (RCA)', icon: 'Search' },
                                { id: 4, label: 'Profil (Form 2)', icon: 'Target' },
                                { id: 6, label: 'Monitoring (Form 3)', icon: 'Activity' },
                                { id: 7, label: 'Pusat Cetak', icon: 'Printer' }
                            ].map(m => (
                                <button key={m.id} onClick={() => setStep(m.id)} className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all ${step === m.id ? 'bg-emerald-600 text-white shadow-lg' : 'hover:bg-slate-800'}`}>
                                    <Icon name={m.icon} />{isSidebarOpen && <span className="text-sm font-semibold">{m.label}</span>}
                                </button>
                            ))}
                            <hr className="border-slate-800 my-2 mx-3" />
                            <button onClick={handleSaveDraft} className="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-blue-400"><Icon name="Save" />{isSidebarOpen && <span className="text-sm font-semibold">Simpan Draft (.txt)</span>}</button>
                            <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-yellow-400"><Icon name="Upload" />{isSidebarOpen && <span className="text-sm font-semibold">Muat Draft (.txt)</span>}</button>
                            <input type="file" accept=".txt" ref={fileInputRef} onChange={handleLoadDraft} className="hidden" />
                        </nav>
                        
                        {/* TOMBOL CEK API KEY */}
                        <div className="p-4 bg-slate-950 border-t border-slate-800">
                            {isSidebarOpen ? (
                                <div className="flex flex-col gap-2">
                                    <p className="text-[10px] text-slate-400 font-mono text-center mb-1">
                                        Model: <span className={activeModel.includes('Error') || activeModel.includes('Kosong') ? 'text-red-500' : 'text-emerald-400 font-bold'}>{activeModel}</span>
                                    </p>
                                    <button onClick={verifyKey} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-[10px] py-2 rounded-lg font-bold transition-colors shadow">
                                        <Icon name="Activity" className="w-3 h-3 inline mr-1" /> Cek Koneksi API
                                    </button>
                                </div>
                            ) : (
                                <Icon name="Activity" className="text-emerald-500 mx-auto w-4 h-4"/>
                            )}
                        </div>
                    </aside>
                    
                    <main className="flex-1 p-4 md:p-8 overflow-x-hidden relative">
                        <header className="flex justify-between items-center mb-8 no-print">
                            <h2 className="text-sm font-bold text-slate-400 tracking-widest uppercase">Langkah {step} / 7</h2>
                            <div className="bg-white px-4 py-2 rounded-xl text-xs font-bold text-emerald-600 shadow-sm border">{profil.faskes}</div>
                        </header>

                        <div className="max-w-[1700px] mx-auto pb-24">
                            {/* ALUR KERJA: STEP 1 (KONTEKS) */}
                            {step === 1 && (
                                <div className="space-y-8 animate-in fade-in">
                                    <div className="bg-white p-8 rounded-3xl border-l-[12px] border-l-emerald-500 shadow-xl border">
                                        <h2 className="text-2xl font-black mb-6">Profil Fasilitas</h2>
                                        <div className="grid md:grid-cols-4 gap-6">
                                            <div><label className="text-[10px] font-black text-slate-400">NAMA INSTANSI</label><input className="input-inline font-bold" value={profil.faskes} onChange={e=>setProfil({...profil, faskes: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">PIMPINAN</label><input className="input-inline font-bold" value={profil.pimpinan} onChange={e=>setProfil({...profil, pimpinan: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">TAHUN</label><input className="input-inline font-bold" value={profil.tahun} onChange={e=>setProfil({...profil, tahun: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">TANGGAL</label><input type="date" className="input-inline font-bold" value={profil.tanggal} onChange={e=>setProfil({...profil, tanggal: e.target.value})} /></div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl shadow-xl border">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-2xl font-black text-emerald-800 uppercase">Hierarki ILP</h2>
                                            <button onClick={()=>setKonteks([...konteks, {id: Date.now(), klaster: '', program: '', kegiatan: '', rincian: '', tujuan: '', sasaran: '', aiGoalOptions: []}])} className="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:scale-105 transition-all">+ Tambah Unit</button>
                                        </div>
                                        {konteks.map(k => (
                                            <div key={k.id} className="p-6 bg-slate-50 border rounded-3xl mb-10 relative group space-y-6">
                                                <div className="grid md:grid-cols-3 gap-6">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">1. KLASTER</label>
                                                        <select className="input-inline select-custom font-bold" value={k.klaster} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, klaster: e.target.value, program: '', kegiatan: '', rincian: ''}:x))}>
                                                            <option value="">Pilih Klaster</option>{Object.keys(ILP_DATABASE).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">2. PROGRAM</label>
                                                        <select className="input-inline select-custom font-bold" disabled={!k.klaster} value={k.program} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, program: e.target.value, kegiatan: '', rincian: ''}:x))}>
                                                            <option value="">Pilih Program</option>{k.klaster && Object.keys(ILP_DATABASE[k.klaster] || {}).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">3. KEGIATAN</label>
                                                        <select className="input-inline select-custom font-bold text-emerald-700" disabled={!k.program} value={k.kegiatan} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, kegiatan: e.target.value, rincian: ''}:x))}>
                                                            <option value="">Pilih Kegiatan</option>{k.program && Object.keys(ILP_DATABASE[k.klaster][k.program] || {}).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="grid md:grid-cols-4 gap-6 pt-4 border-t items-end">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">4. RINCIAN UNIT</label>
                                                        <select className="input-inline font-black text-emerald-600 select-custom" disabled={!k.kegiatan} value={k.rincian} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, rincian: e.target.value}:x))}>
                                                            <option value="">Pilih Rincian</option>{k.kegiatan && (ILP_DATABASE[k.klaster][k.program][k.kegiatan] || []).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase">TUJUAN STRATEGIS</label>
                                                        <textarea className="input-inline italic text-xs h-12" value={k.tujuan} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, tujuan: e.target.value}:x))} />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase">SASARAN KINERJA</label>
                                                        <textarea className="input-inline italic text-xs h-12" value={k.sasaran} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, sasaran: e.target.value}:x))} />
                                                    </div>
                                                    <button onClick={()=>handleAIGoals(k.id)} className="bg-blue-600 text-white p-3 rounded-2xl text-[10px] font-black flex items-center justify-center hover:scale-105 transition shadow"><Icon name="Sparkles" className="w-3 h-3 mr-2"/> SARAN AI</button>
                                                </div>
                                                {k.aiGoalOptions?.length > 0 && (
                                                    <div className="grid md:grid-cols-3 gap-3 mt-4">
                                                        {k.aiGoalOptions.map((opt, idx) => (
                                                            <div key={idx} onClick={()=>{ setKonteks(konteks.map(x => x.id === k.id ? { ...x, tujuan: opt.tujuan, sasaran: opt.sasaran, aiGoalOptions: [] } : x)); }} className="p-3 border rounded-xl hover:bg-blue-50 cursor-pointer text-[10px]">
                                                                <p className="font-bold text-blue-800">Opsi {idx+1}:</p><p className="italic mb-1">{opt.tujuan}</p><p className="font-medium">{opt.sasaran}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                <button onClick={()=>setKonteks(konteks.filter(x=>x.id!==k.id))} className="absolute -right-3 -top-3 opacity-0 group-hover:opacity-100 bg-red-500 text-white p-2 rounded-full"><Icon name="Trash2" className="w-4 h-4"/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* ALUR KERJA: STEP 2 (REGISTER F1) */}
                            {step === 2 && (
                                <div className="space-y-6 animate-in fade-in">
                                    <div className="flex justify-between items-end"><h2 className="text-3xl font-black">Register Risiko (Form 1)</h2><button onClick={tambahRisiko} className="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black hover:bg-emerald-700 shadow-lg">+ Baris Baru</button></div>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-xl custom-scrollbar">
                                        <table className="w-full text-[10px] border-collapse min-w-[2200px]">
                                            <thead className="bg-slate-800 text-white font-bold sticky top-0 z-10 text-center">
                                                <tr>
                                                    <th className="p-3 border border-slate-700" rowSpan="2">Unit</th><th className="p-3 border border-slate-700 text-yellow-300" rowSpan="2">Kategori</th><th className="p-3 border border-slate-700" colSpan="6">Identifikasi</th><th className="p-3 border border-slate-700" rowSpan="2">Kontrol</th><th className="p-3 border border-slate-700" colSpan="4">Inherent</th><th className="p-3 border border-slate-700" colSpan="2">Evaluasi</th><th className="p-3 border border-slate-700 text-yellow-300 no-print" rowSpan="2">AI</th>
                                                </tr>
                                                <tr className="bg-slate-700 text-[8px]"><th>Sumber</th><th>Sebab</th><th>Kode</th><th>Risiko</th><th>Dampak</th><th>Narasi</th><th>D</th><th>K</th><th title="Bobot Non Klinis">B*</th><th>Skor</th><th>Selera</th><th>Mitigasi</th></tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map((r, i) => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRiskOptions?.length > 0 && (
                                                            <tr>
                                                                <td colSpan="17" className="p-4 bg-emerald-50 border-b border-emerald-200">
                                                                    <div className="grid md:grid-cols-3 gap-4">
                                                                        {r.aiRiskOptions.map((opt, idx) => (
                                                                            <div key={idx} onClick={()=>applyAiRiskOption(r.id, opt)} className="bg-white p-3 rounded-xl border border-emerald-200 cursor-pointer hover:shadow-lg">
                                                                                <p className="font-bold text-emerald-900">Opsi {idx+1}: {opt.risiko}</p><p className="italic text-slate-600 mt-1">{opt.pernyataan}</p>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        )}
                                                        <tr className="hover:bg-slate-50 transition-colors">
                                                            <td className="p-1 border"><select className="w-full bg-transparent font-bold outline-none text-blue-800" value={r.idKonteks} onChange={e=>updateRisiko(r.id, 'idKonteks', parseInt(e.target.value))}><option value="">Pilih</option>{konteks.map(c => <option key={c.id} value={c.id}>{c.rincian}</option>)}</select></td>
                                                            <td className="p-1 border bg-emerald-50/50"><select className="w-full bg-transparent font-bold text-emerald-800 outline-none" value={r.kategori} onChange={e=>updateRisiko(r.id, 'kategori', e.target.value)}><option value="">Kategori</option>{KATEGORI_RISIKO.map(k=><option key={k}>{k}</option>)}</select></td>
                                                            <td className="p-1 border"><input className="w-full bg-transparent outline-none" value={r.identifikasi.sumber} onChange={e=>updateRisiko(r.id, 'identifikasi.sumber', e.target.value)} /></td>
                                                            <td className="p-1 border"><input className="w-full bg-transparent outline-none" value={r.identifikasi.sebab} onChange={e=>updateRisiko(r.id, 'identifikasi.sebab', e.target.value)} /></td>
                                                            <td className="p-1 border text-center font-mono font-bold bg-slate-100">{r.identifikasi.kode}</td>
                                                            <td className="p-1 border font-bold text-emerald-800"><textarea className="w-full h-12 bg-transparent outline-none" value={r.identifikasi.risiko} onChange={e=>updateRisiko(r.id, 'identifikasi.risiko', e.target.value)} /></td>
                                                            <td className="p-1 border"><textarea className="w-full h-12 bg-transparent outline-none" value={r.identifikasi.dampak} onChange={e=>updateRisiko(r.id, 'identifikasi.dampak', e.target.value)} /></td>

                                                        const ctx = konteks.find(c=>c.id===r.idKonteks);
                                                        return (
                                                        <tr key={i}>
                                                            <td className="text-center font-bold border border-black">{ctx?.rincian || '-'}</td>
                                                            <td className="text-center font-mono border border-black">{r.identifikasi.kode}</td>
                                                            <td className="border border-black font-bold">{r.identifikasi.risiko}</td>
                                                            <td className="border border-black italic text-red-800">{r.rca.akar}</td>
                                                            <td className="text-center font-bold border border-black">{r.analisa.d}</td>
                                                            <td className="text-center font-bold border border-black">{r.analisa.k}</td>
                                                            <td className="text-center font-bold text-blue-800 bg-blue-50 border border-black">*</td>
                                                            <td className="text-center font-bold border border-black">{r.analisa.skor}</td>
                                                            <td className="border border-black">{r.rtp.opsi}</td>
                                                            <td className="border border-black">{r.rtp.uraian}</td>
                                                            <td className="text-center border border-black">{r.rtp.waktu}</td>
                                                            <td className="border border-black">{r.rtp.biaya}</td>
                                                            <td className="text-center font-bold border border-black">{r.rtp.rd}</td>
                                                            <td className="text-center font-bold border border-black">{r.rtp.rk}</td>
                                                            <td className="text-center font-bold text-emerald-800 bg-emerald-50 border border-black">*</td>
                                                            <td className="text-center font-black border border-black">{r.rtp.rskor}</td>
                                                            <td className="border border-black font-bold text-emerald-900">{r.rtp.pemilik}</td>
                                                        </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                        )}

                                        {(printFormType === 'SEMUA' || printFormType === 'PEMANTAUAN') && (
                                        <div className="bg-white p-6 border border-black print-section shadow-sm">
                                            <div className="kop-surat mb-6 uppercase">
                                                <h1 className="text-lg font-black tracking-tighter">FORM 3: PEMANTAUAN DAN PENINJAUAN RISIKO</h1>
                                                <p className="text-[10px] font-bold leading-tight">{profil.faskes} - TAHUN ANGGARAN {profil.tahun}</p>
                                            </div>
                                            <table className="w-full border-collapse border border-black">
                                                <thead className="bg-slate-100 text-center font-bold">
                                                    <tr>
                                                        <th className="border border-black p-2">Unit Terkait</th><th className="border border-black p-2">Kode</th><th className="border border-black p-2">Risiko Prioritas</th><th className="border border-black p-2">Realisasi Penanganan</th><th className="border border-black p-2">Hambatan</th><th className="border border-black p-2">Usulan Alternatif (RTL)</th><th className="border border-black p-2">Skor Res</th><th className="border border-black p-2">Trend</th><th className="border border-black p-2">Efektivitas</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {risiko.filter(r=>r.evaluasi.perluPenanganan==='Ya').map((r, i) => {
                                                        const ctx = konteks.find(c=>c.id===r.idKonteks);
                                                        return (
                                                        <tr key={i}>
                                                            <td className="text-center font-bold border border-black p-2">{ctx?.rincian || '-'}</td>
                                                            <td className="text-center font-mono border border-black p-2">{r.identifikasi.kode}</td>
                                                            <td className="font-bold border border-black p-2">{r.identifikasi.risiko}</td>
                                                            <td className="border border-black p-2">{r.monitoring.realisasi}</td>
                                                            <td className="border border-black p-2">{r.monitoring.hambatan}</td>
                                                            <td className="border border-black p-2">{r.monitoring.usulan}</td>
                                                            <td className="text-center font-bold border border-black p-2">{r.rtp.rskor}</td>
                                                            <td className="text-center font-bold uppercase border border-black p-2">{r.monitoring.trend}</td>
                                                            <td className="border border-black p-2">{r.monitoring.efektivitas}</td>
                                                        </tr>
                                                        );
                                                    })}
                                                </tbody>
                                            </table>
                                        </div>
                                        )}

                                        {(printFormType === 'SEMUA' || printFormType === 'RCA') && (
                                        <div className="bg-white p-6 border border-black print-section shadow-sm">
                                            <div className="kop-surat mb-6 uppercase">
                                                <h1 className="text-lg font-black tracking-tighter">LAPORAN ROOT CAUSE ANALYSIS (RCA 5-WHY)</h1>
                                                <p className="text-[10px] font-bold leading-tight">{profil.faskes} - TAHUN ANGGARAN {profil.tahun}</p>
                                            </div>
                                            <div className="grid grid-cols-1 gap-6">
                                                {risiko.map((r, i) => (
                                                    <div key={i} className="border border-black p-4 bg-slate-50 break-inside-avoid shadow-sm rounded-lg">
                                                        <h3 className="font-bold text-sm mb-3 border-b border-black pb-2"><span className="font-mono bg-black text-white px-2 py-0.5 rounded mr-2">{r.identifikasi.kode}</span> {r.identifikasi.risiko}</h3>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            <div>
                                                                <p className="text-[9px] font-bold mb-1">Analisis Berantai (5-Why):</p>
                                                                <ul className="text-[9px] list-decimal pl-4 space-y-1">
                                                                    <li>{r.rca.w1 || '-'}</li><li>{r.rca.w2 || '-'}</li><li>{r.rca.w3 || '-'}</li><li>{r.rca.w4 || '-'}</li><li>{r.rca.w5 || '-'}</li>
                                                                </ul>
                                                            </div>
                                                            <div className="border-l border-black pl-4">
                                                                <p className="text-[9px] font-bold text-red-600 mb-1">Akar Masalah Sistemik:</p>
                                                                <p className="font-bold text-sm text-red-900 mb-3 bg-red-100 p-2 rounded">{r.rca.akar || 'Belum ada akar masalah'}</p>
                                                                <p className="text-[9px] font-bold text-slate-600">Jenis Penyebab: <span className="font-normal text-black">{r.rca.jenis}</span></p>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        )}

                                        {(printFormType === 'SEMUA' || printFormType === 'LAMPIRAN') && (
                                        <div className="bg-white p-6 border border-black print-appendix shadow-sm">
                                            <div className="kop-surat mb-6 uppercase">
                                                <h1 className="text-lg font-black tracking-tighter">LAMPIRAN: KRITERIA DAN MATRIKS PENILAIAN RISIKO</h1>
                                            </div>
                                            <div className="grid grid-cols-2 gap-4 mb-4">
                                                <div>
                                                    <h3 className="font-bold text-[9px] mb-1 bg-slate-200 p-1 text-center border border-black">TABEL 1: TINGKAT KEMUNGKINAN (K)</h3>
                                                    <table className="w-full border-collapse border border-black text-[7px] text-center">
                                                        <thead className="bg-slate-100 font-bold">
                                                            <tr><th className="border border-black">Level</th><th className="border border-black">Kriteria</th><th className="border border-black">Frekuensi Aktual</th></tr>
                                                        </thead>
                                                        <tbody>
                                                            <tr><td className="border border-black font-bold">1</td><td className="border border-black font-bold">Sangat Jarang</td><td className="border border-black">Terjadi &gt; 5 tahun sekali</td></tr>
                                                            <tr><td className="border border-black font-bold">2</td><td className="border border-black font-bold">Jarang</td><td className="border border-black">Terjadi 2 - 5 tahun sekali</td></tr>
                                                            <tr><td className="border border-black font-bold">3</td><td className="border border-black font-bold">Sedang</td><td className="border border-black">Terjadi 1 - 2 tahun sekali</td></tr>
                                                            <tr><td className="border border-black font-bold">4</td><td className="border border-black font-bold">Sering</td><td className="border border-black">Terjadi beberapa kali setahun</td></tr>
                                                            <tr><td className="border border-black font-bold">5</td><td className="border border-black font-bold">Sangat Sering</td><td className="border border-black">Terjadi tiap minggu/bulan</td></tr>
                                                        </tbody>
                                                    </table>
                                                </div>
                                                <div>
                                                    <h3 className="font-bold text-[9px] mb-1 bg-slate-200 p-1 text-center border border-black">TABEL 4: MATRIKS GRADING RISIKO (D x K)</h3>
                                                    <table className="w-full border-collapse border border-black text-[7px] text-center font-bold">
                                                        <tbody>
                                                            <tr>
                                                                <td rowSpan="6" className="w-6 rotate-180 transform bg-slate-100 border border-black" style={{ writingMode: 'vertical-rl' }}>KEMUNGKINAN (K)</td>
                                                                <td className="border border-black bg-slate-50">5</td><td className="border border-black bg-yellow-400 text-slate-900">5</td><td className="border border-black bg-yellow-400 text-slate-900">10</td><td className="border border-black bg-orange-500 text-white">15</td><td className="border border-black bg-red-600 text-white">20</td><td className="border border-black bg-red-600 text-white">25</td>
                                                            </tr>
                                                            <tr><td className="border border-black bg-slate-50">4</td><td className="border border-black bg-green-500 text-white">4</td><td className="border border-black bg-yellow-400 text-slate-900">8</td><td className="border border-black bg-yellow-400 text-slate-900">12</td><td className="border border-black bg-orange-500 text-white">16</td><td className="border border-black bg-red-600 text-white">20</td></tr>
                                                            <tr><td className="border border-black bg-slate-50">3</td><td className="border border-black bg-green-500 text-white">3</td><td className="border border-black bg-green-500 text-white">6</td><td className="border border-black bg-yellow-400 text-slate-900">9</td><td className="border border-black bg-yellow-400 text-slate-900">12</td><td className="border border-black bg-orange-500 text-white">15</td></tr>
                                                            <tr><td className="border border-black bg-slate-50">2</td><td className="border border-black bg-blue-500 text-white">2</td><td className="border border-black bg-green-500 text-white">4</td><td className="border border-black bg-green-500 text-white">6</td><td className="border border-black bg-yellow-400 text-slate-900">8</td><td className="border border-black bg-yellow-400 text-slate-900">10</td></tr>
                                                            <tr><td className="border border-black bg-slate-50">1</td><td className="border border-black bg-blue-500 text-white">1</td><td className="border border-black bg-blue-500 text-white">2</td><td className="border border-black bg-green-500 text-white">3</td><td className="border border-black bg-green-500 text-white">4</td><td className="border border-black bg-yellow-400 text-slate-900">5</td></tr>
                                                            <tr><td className="border border-black bg-slate-100">x</td><td className="border border-black bg-slate-50">1</td><td className="border border-black bg-slate-50">2</td><td className="border border-black bg-slate-50">3</td><td className="border border-black bg-slate-50">4</td><td className="border border-black bg-slate-50">5</td></tr>
                                                            <tr><td colSpan="2" className="border border-black bg-slate-100">DAMPAK (D) &rarr;</td><td className="border border-black bg-slate-50 text-[6px]">Sgt Ringan</td><td className="border border-black bg-slate-50 text-[6px]">Ringan</td><td className="border border-black bg-slate-50 text-[6px]">Sedang</td><td className="border border-black bg-slate-50 text-[6px]">Berat</td><td className="border border-black bg-slate-50 text-[6px]">Sgt Berat</td></tr>
                                                        </tbody>
                                                    </table>
                                                </div>
                                            </div>
                                        </div>
                                        )}

                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

        const callGeminiJson = async (prompt, schemaFormat, userApiKey) => {
            const apiKeyToUse = userApiKey || "";
            if (!apiKeyToUse) throw new Error("API Key belum disinkronisasi dengan Portal.");
            const modelsToTry = ['gemini-2.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash'];
            const fullPrompt = `TUGAS: Anda adalah asisten pakar Manajemen Risiko Fasyankes. Berikan hasil HANYA dalam format JSON valid tanpa penjelasan apapun.\n\nSKEMA JSON:\n${JSON.stringify(schemaFormat, null, 2)}\n\nPERINTAH:\n${prompt}`;
            
            let lastError = "";
            let isRateLimited = false;

            for (const model of modelsToTry) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKeyToUse}`;
                let delay = 1000;
                
                for (let retry = 0; retry < 3; retry++) { 
                    try {
                        const response = await fetch(url, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullPrompt }] }],
                                generationConfig: { temperature: 0.2 } 
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (!response.ok) {
                            lastError = data.error?.message || `HTTP Error ${response.status}`;
                            if (response.status === 400 && lastError.toLowerCase().includes("api key not valid")) throw new Error("API_KEY_INVALID"); 
                            if (response.status === 429) { isRateLimited = true; throw new Error("RATE_LIMIT"); }
                            if (response.status === 404) throw new Error("NOT_FOUND");
                            throw new Error(lastError);
                        }
                        
                        let textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!textResponse) throw new Error("Respon AI kosong.");

                        window.dispatchEvent(new CustomEvent('model-detected', { detail: model }));
                        
                        let cleanJson = textResponse.replace(/```json/gi, '').replace(/```/g, '').trim();
                        const start = Math.max(cleanJson.indexOf('{'), cleanJson.indexOf('['));
                        const end = Math.max(cleanJson.lastIndexOf('}'), cleanJson.lastIndexOf(']'));
                        
                        if(start !== -1 && end !== -1) cleanJson = cleanJson.substring(start, end + 1);
                        return JSON.parse(cleanJson); 
                    } catch (e) {
                        if (e.message === "API_KEY_INVALID") throw new Error("API Key tidak valid."); 
                        if (e.message === "NOT_FOUND") break; 
                        
                        if (e.message === "RATE_LIMIT") {
                            lastError = "API sedang sibuk. Menunggu akses...";
                            window.parent.postMessage({ type: 'API_ERROR', code: 429 }, '*');
                        } else {
                            lastError = e.message;
                        }
                        
                        if (retry < 2) { 
                            await new Promise(res => setTimeout(res, delay)); 
                            delay *= 2; 
                        }
                    }
                }
            }
            if (isRateLimited) throw new Error("Limit Quota. Dashboard akan mencoba merotasi key.");
            throw new Error(lastError || "Koneksi ke AI bermasalah.");
        };

                    const parts = path.split('.');
                    let curr = newR;
                    
                    for (let i = 0; i < parts.length - 1; i++) curr = curr[parts[i]];
                    curr[parts[parts.length - 1]] = value;

                    if (path === 'kategori') {
                        newR.identifikasi.kode = generateKode(value, index + 1);
                        if(isKlinis(value)) newR.analisa.b = 1; 
                    }

                    let skorChanged = false;
                    if (path.includes('analisa')) {
                        newR.analisa.skor = (parseInt(newR.analisa.d) || 0) * (parseInt(newR.analisa.k) || 0);
                        newR.analisa.tingkat = getTingkat(newR.analisa.skor).label;
                        newR.evaluasi.selera = newR.analisa.skor >= 8 ? "Diatas selera risiko" : "Dibawah selera risiko";
                        newR.evaluasi.perluPenanganan = newR.analisa.skor >= 8 ? "Ya" : "Tidak";
                        skorChanged = true;
                    }
                    if (path.includes('rtp') && (path.includes('rd') || path.includes('rk'))) {
                        newR.rtp.rskor = (parseInt(newR.rtp.rd) || 0) * (parseInt(newR.rtp.rk) || 0);
                        newR.rtp.rtingkat = getTingkat(newR.rtp.rskor).label;
                        skorChanged = true;
                    }

                    if (skorChanged && newR.analisa.skor > 0 && newR.rtp.rskor > 0) {
                        if (newR.rtp.rskor < newR.analisa.skor) {
                            newR.monitoring.trend = "Turun"; newR.monitoring.efektivitas = "Efektif";
                        } else if (newR.rtp.rskor === newR.analisa.skor) {
                            newR.monitoring.trend = "Tetap"; newR.monitoring.efektivitas = "Sebagian Efektif";
                        } else {
                            newR.monitoring.trend = "Naik"; newR.monitoring.efektivitas = "Tidak Efektif";
                        }
                    }
                    return newR;
                }));
            };

            const tambahRisiko = () => {
                setRisiko([...risiko, {
                    id: Date.now(), idKonteks: '', kategori: '', area: '',
                    identifikasi: { sumber: '', sebab: '', kode: '', risiko: '', dampak: '', pernyataan: '' },
                    analisa: { pengendalian: '', d: 1, k: 1, b: 1, skor: 1, tingkat: 'SANGAT RENDAH' },
                    evaluasi: { selera: 'Dibawah selera risiko', perluPenanganan: 'Tidak' },
                    rca: { w1: '', w2: '', w3: '', w4: '', w5: '', akar: '', jenis: '' },
                    rtp: { opsi: '', biaya: '', uraian: '', waktu: '', rd: 1, rk: 1, rb: 1, rskor: 1, rtingkat: 'SANGAT RENDAH', pemilik: 'PJ Mutu', pengelola: '' },
                    monitoring: { realisasi: '', hambatan: '', usulan: '', trend: 'Tetap', efektivitas: '' },
                    aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []
                }]);
            };

            const applyAiRiskOption = (rId, opt) => {
                setRisiko(prev => prev.map((r, index) => {
                    if (r.id !== rId) return r;
                    const newR = JSON.parse(JSON.stringify(r));
                    newR.kategori = opt.kategori || newR.kategori;
                    newR.identifikasi.kode = generateKode(newR.kategori, index + 1);
                    newR.identifikasi.sumber = opt.sumber; newR.identifikasi.sebab = opt.sebab;
                    newR.identifikasi.risiko = opt.risiko; newR.identifikasi.dampak = opt.dampak;
                    newR.identifikasi.pernyataan = opt.pernyataan; newR.analisa.pengendalian = opt.pengendalian;
                    newR.analisa.d = opt.d; newR.analisa.k = opt.k; newR.analisa.b = isKlinis(newR.kategori) ? 1 : (opt.b || 5);
                    newR.analisa.skor = (parseInt(opt.d) || 0) * (parseInt(opt.k) || 0);
                    newR.evaluasi.selera = newR.analisa.skor >= 8 ? "Diatas selera risiko" : "Dibawah selera risiko";
                    newR.evaluasi.perluPenanganan = newR.analisa.skor >= 8 ? "Ya" : "Tidak";
                    newR.aiRiskOptions = [];
                    return newR;
                }));
            };

            const applyAiRtpOption = (rId, opt) => {
                setRisiko(prev => prev.map((r) => {
                    if (r.id !== rId) return r;
                    const newR = JSON.parse(JSON.stringify(r));
                    newR.rtp = { ...newR.rtp, ...opt };
                    newR.rtp.rskor = (parseInt(opt.rd) || 0) * (parseInt(opt.rk) || 0);
                    if (newR.analisa.skor > 0 && newR.rtp.rskor > 0) {
                        newR.monitoring.trend = newR.rtp.rskor < newR.analisa.skor ? "Turun" : newR.rtp.rskor === newR.analisa.skor ? "Tetap" : "Naik";
                        newR.monitoring.efektivitas = newR.rtp.rskor < newR.analisa.skor ? "Efektif" : newR.rtp.rskor === newR.analisa.skor ? "Sebagian Efektif" : "Tidak Efektif";
                    }
                    newR.aiRtpOptions = [];
                    return newR;
                }));
            };

            const handleAIGoals = async (cId) => {
                const c = konteks.find(x => x.id === cId);
                if(!c.rincian) return showToast("⚠️ Pilih 'Rincian Unit' ILP terlebih dahulu.");
                showToast("⚡ AI sedang merangkum pilihan sasaran...");
                try {
                    const res = await callGeminiJson(`Berikan 3 variasi Tujuan dan Sasaran Mutu Kinerja spesifik untuk kegiatan "${c.rincian}" Puskesmas.`, { options: [{ tujuan: "string", sasaran: "string" }] }, apiKey);
                    setKonteks(konteks.map(x => x.id === cId ? { ...x, aiGoalOptions: res.options } : x));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIGenerateRisks = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.idKonteks || !r.kategori) return showToast("⚠️ Pilih 'Konteks Unit' & 'Kategori Risiko'.");
                const c = konteks.find(ctx => ctx.id === r.idKonteks);
                showToast("⚡ AI menyusun opsi identifikasi risiko...");
                try {
                    const panduan = isKlinis(r.kategori) ? "Klinis b=1." : "Non-Klinis b=1-5.";
                    const res = await callGeminiJson(`Buat 3 opsi identifikasi risiko KHUSUS kategori "${r.kategori}" kegiatan "${c.rincian}" sasaran "${c.sasaran}". \n${panduan}`, { options: [{ sumber: "Internal/Eksternal", sebab: "string", risiko: "string", dampak: "string", pernyataan: "Sebab->Risiko->Dampak", d: "1-5", k: "1-5", b: "1-5", pengendalian: "string" }] }, apiKey);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRiskOptions: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIRCA = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.identifikasi.pernyataan) return showToast("⚠️ Pernyataan Risiko kosong!");
                showToast("⚡ AI membedah akar masalah (5-Why)...");
                try {
                    const res = await callGeminiJson(`Lakukan RCA mendalam untuk risiko: "${r.identifikasi.pernyataan}". Gali kegagalan sistemik/kebijakan.`, { rca: { w1: "string", w2: "string", w3: "string", w4: "string", w5: "string", akar: "string", jenis: "string" } }, apiKey);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, rca: res.rca } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIRTP = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.rca.akar) return showToast("⚠️ Lakukan RCA dahulu!");
                showToast("⚡ AI menyusun opsi saran RTP...");
                try {
                    const res = await callGeminiJson(`Beri 3 saran rencana penanganan (RTP) mengatasi akar masalah: "${r.rca.akar}".`, { options: [{ opsi: "Pilih 1 Opsi", biaya: "Retensi/Transfer", uraian: "string", waktu: "string", rd: "1-5", rk: "1-5", pemilik: "Jabatan", pengelola: "string" }] }, apiKey);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRtpOptions: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIMonitoring = async (rId, phase) => {
                const r = risiko.find(x => x.id === rId);
                showToast(`⚡ AI menyusun opsi ${phase}...`);
                try {
                    let p = phase === 'Realisasi' ? `3 opsi tindakan nyata untuk rencana: "${r.rtp.uraian}".` 
                          : phase === 'Hambatan' ? `3 hambatan saat merealisasikan: "${r.monitoring.realisasi}".` 
                          : `3 usulan mengatasi hambatan: "${r.monitoring.hambatan}".`;
                    const res = await callGeminiJson(p, { options: [{ teks: "string" }] }, apiKey);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, [`ai${phase}Options`]: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            return (
                <div className="flex min-h-screen">
                    {toast && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold animate-in slide-in-from-top-4">{toast}</div>}
                    
                    <aside className={`no-print ${isSidebarOpen ? 'w-72' : 'w-20'} bg-slate-900 text-slate-400 transition-all duration-300 flex flex-col h-screen sticky top-0 shrink-0 z-50`}>
                        <div className="p-6 text-white font-black text-xl flex items-center gap-3 border-b border-slate-800 relative">
                            <div className="bg-emerald-500 p-2 rounded-lg text-slate-900"><Icon name="BrainCircuit" /></div>
                            {isSidebarOpen && <span className="uppercase">SIMR AI PRO</span>}
                        </div>
                        <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="absolute -right-3 top-20 bg-emerald-500 text-white p-1 rounded-full border-2 border-white z-10"><Icon name={isSidebarOpen ? "ChevronLeft" : "ChevronRight"} className="w-4 h-4" /></button>
                        <nav className="flex-1 px-3 py-6 space-y-2 overflow-y-auto">
                            {[
                                { id: 1, label: 'Konteks ILP', icon: 'Building2' },
                                { id: 2, label: 'Register (Form 1)', icon: 'AlertTriangle' },
                                { id: 3, label: 'Akar Masalah (RCA)', icon: 'Search' },
                                { id: 4, label: 'Profil (Form 2)', icon: 'Target' },
                                { id: 6, label: 'Monitoring (Form 3)', icon: 'Activity' },
                                { id: 7, label: 'Pusat Cetak', icon: 'Printer' }
                            ].map(m => (
                                <button key={m.id} onClick={() => setStep(m.id)} className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all ${step === m.id ? 'bg-emerald-600 text-white' : 'hover:bg-slate-800'}`}>
                                    <Icon name={m.icon} />{isSidebarOpen && <span className="text-sm font-semibold">{m.label}</span>}
                                </button>
                            ))}
                            <hr className="border-slate-800 my-2 mx-3" />
                            <button onClick={handleSaveDraft} className="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-blue-400"><Icon name="Save" />{isSidebarOpen && <span className="text-sm font-semibold">Simpan Draft (.txt)</span>}</button>
                            <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-yellow-400"><Icon name="Upload" />{isSidebarOpen && <span className="text-sm font-semibold">Muat Draft (.txt)</span>}</button>
                            <input type="file" accept=".txt" ref={fileInputRef} onChange={handleLoadDraft} className="hidden" />
                        </nav>
                        <div className="p-4 bg-slate-950 border-t border-slate-800 shrink-0">
                            {isSidebarOpen && (
                                <>
                                    <div className="flex items-center gap-2 mb-2">
                                        <input type="password" value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} placeholder="API Key" className="w-full p-2 bg-slate-900 border border-slate-700 rounded text-xs text-white" />
                                        <button onClick={simpanApiKey} className="bg-emerald-600 text-white px-3 py-2 rounded text-xs font-bold">Set</button>
                                    </div>
                                    <p className="text-[9px] text-emerald-500">Model: {activeModel}</p>
                                </>
                            )}
                        </div>
                    </aside>
                    
                    <main className="flex-1 p-4 md:p-8 overflow-x-hidden relative">
                        <header className="flex justify-between items-center mb-8 no-print">
                            <h2 className="text-sm font-bold text-slate-400 tracking-widest uppercase">Langkah {step} / 7</h2>
                            <div className="bg-white px-4 py-2 rounded-xl text-xs font-bold text-emerald-600 border">{profil.faskes} • {profil.tahun}</div>
                        </header>

                        <div className="max-w-[1700px] mx-auto pb-24">
                            {/* STEP 1: CONTEXT */}
                            {step === 1 && (
                                <div className="space-y-8 animate-in fade-in">
                                    <div className="bg-white p-8 rounded-3xl border-l-[12px] border-l-emerald-500 shadow-xl border">
                                        <h2 className="text-2xl font-black mb-6">Profil Fasilitas</h2>
                                        <div className="grid md:grid-cols-4 gap-6">
                                            <div><label className="text-[10px] font-black text-slate-400">NAMA INSTANSI</label><input className="input-inline font-bold" value={profil.faskes} onChange={e=>setProfil({...profil, faskes: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">PIMPINAN</label><input className="input-inline font-bold" value={profil.pimpinan} onChange={e=>setProfil({...profil, pimpinan: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">TAHUN</label><input className="input-inline font-bold" value={profil.tahun} onChange={e=>setProfil({...profil, tahun: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">TANGGAL</label><input type="date" className="input-inline font-bold" value={profil.tanggal} onChange={e=>setProfil({...profil, tanggal: e.target.value})} /></div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-3xl shadow-xl border">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-2xl font-black uppercase text-emerald-800">Hierarki ILP</h2>
                                            <button onClick={()=>setKonteks([...konteks, {id: Date.now(), klaster: '', program: '', kegiatan: '', rincian: '', tujuan: '', sasaran: '', aiGoalOptions: []}])} className="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold shadow-md hover:scale-105 transition-all">+ Tambah</button>
                                        </div>
                                        {konteks.map(k => (
                                            <div key={k.id} className="p-6 bg-slate-50 border rounded-3xl mb-10 relative group space-y-6">
                                                <div className="grid md:grid-cols-3 gap-6">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">1. KLASTER</label>
                                                        <select className="input-inline select-custom font-bold" value={k.klaster} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, klaster: e.target.value, program: '', kegiatan: '', rincian: ''}:x))}>
                                                            <option value="">Pilih Klaster</option>{Object.keys(ILP_DATABASE).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">2. PROGRAM</label>
                                                        <select className="input-inline select-custom font-bold" disabled={!k.klaster} value={k.program} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, program: e.target.value, kegiatan: '', rincian: ''}:x))}>
                                                            <option value="">Pilih Program</option>{k.klaster && Object.keys(ILP_DATABASE[k.klaster] || {}).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">3. KEGIATAN</label>
                                                        <select className="input-inline select-custom font-bold text-emerald-700" disabled={!k.program} value={k.kegiatan} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, kegiatan: e.target.value, rincian: ''}:x))}>
                                                            <option value="">Pilih Kegiatan</option>{k.program && Object.keys(ILP_DATABASE[k.klaster][k.program] || {}).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                </div>
                                                <div className="grid md:grid-cols-4 gap-6 pt-4 border-t items-end">
                                                    <div>
                                                        <label className="text-[10px] font-black text-slate-400 uppercase">4. RINCIAN UNIT</label>
                                                        <select className="input-inline font-black text-emerald-600 select-custom" disabled={!k.kegiatan} value={k.rincian} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, rincian: e.target.value}:x))}>
                                                            <option value="">Pilih Rincian</option>{k.kegiatan && (ILP_DATABASE[k.klaster][k.program][k.kegiatan] || []).map(opt=><option key={opt}>{opt}</option>)}
                                                        </select>
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase">TUJUAN STRATEGIS</label>
                                                        <textarea className="input-inline italic text-xs h-16" value={k.tujuan} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, tujuan: e.target.value}:x))} />
                                                    </div>
                                                    <div>
                                                        <label className="text-[10px] font-bold text-slate-400 uppercase">SASARAN KINERJA</label>
                                                        <textarea className="input-inline italic text-xs h-16" value={k.sasaran} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, sasaran: e.target.value}:x))} />
                                                    </div>
                                                    <button onClick={()=>handleAIGoals(k.id)} className="bg-blue-600 text-white p-3 rounded-2xl text-[10px] font-black flex items-center justify-center hover:scale-105 transition"><Icon name="Sparkles" className="w-3 h-3 mr-2"/> SARAN AI</button>
                                                </div>
                                                {k.aiGoalOptions?.length > 0 && (
                                                    <div className="grid md:grid-cols-3 gap-3 mt-4">
                                                        {k.aiGoalOptions.map((opt, idx) => (
                                                            <div key={idx} onClick={()=>{ setKonteks(konteks.map(x => x.id === k.id ? { ...x, tujuan: opt.tujuan, sasaran: opt.sasaran, aiGoalOptions: [] } : x)); }} className="p-3 border rounded-xl hover:bg-blue-50 cursor-pointer text-[10px]">
                                                                <p className="font-bold text-blue-800">Opsi {idx+1}:</p>
                                                                <p className="italic">{opt.tujuan}</p><p className="font-medium">{opt.sasaran}</p>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                                <button onClick={()=>setKonteks(konteks.filter(x=>x.id!==k.id))} className="absolute -right-3 -top-3 opacity-0 group-hover:opacity-100 bg-red-500 text-white p-2 rounded-full"><Icon name="Trash2" className="w-4 h-4"/></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* STEP 2: REGISTER (FORM 1) */}
                            {step === 2 && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-end"><h2 className="text-3xl font-black">Register (Form 1)</h2><button onClick={tambahRisiko} className="bg-emerald-600 text-white px-6 py-3 rounded-2xl font-black">+ Baris Baru</button></div>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-2xl custom-scrollbar">
                                        <table className="w-full text-[10px] border-collapse min-w-[2200px]">
                                            <thead className="bg-slate-800 text-white font-bold sticky top-0">
                                                <tr>
                                                    <th className="p-3 border" rowSpan="2">Unit</th><th className="p-3 border" rowSpan="2">Kategori</th><th className="p-3 border" colSpan="6">Identifikasi</th><th className="p-3 border" rowSpan="2">Kontrol</th><th className="p-3 border" colSpan="4">Inherent</th><th className="p-3 border" colSpan="2">Evaluasi</th><th className="p-3 border" rowSpan="2">AI</th>
                                                </tr>
                                                <tr className="bg-slate-700 text-[8px]"><th>Sumber</th><th>Sebab</th><th>Kode</th><th>Risiko</th><th>Dampak</th><th>Narasi</th><th>D</th><th>K</th><th>B*</th><th>Skor</th><th>Selera</th><th>Mitigasi</th></tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map((r, i) => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRiskOptions?.length > 0 && (
                                                            <tr>
                                                                <td colSpan="17" className="p-4 bg-emerald-50">
                                                                    <div className="grid md:grid-cols-3 gap-4">
                                                                        {r.aiRiskOptions.map((opt, idx) => (
                                                                            <div key={idx} onClick={()=>applyAiRiskOption(r.id, opt)} className="bg-white p-3 rounded-xl border cursor-pointer hover:shadow">
                                                                                <p className="font-bold">Opsi {idx+1}: {opt.risiko}</p><p className="italic text-slate-600">{opt.pernyataan}</p>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        )}
                                                        <tr className="hover:bg-slate-50">
                                                            <td className="p-1 border"><select className="w-full bg-transparent font-bold outline-none" value={r.idKonteks} onChange={e=>updateRisiko(r.id, 'idKonteks', parseInt(e.target.value))}><option value="">Pilih</option>{konteks.map(c => <option key={c.id} value={c.id}>{c.rincian}</option>)}</select></td>
                                                            <td className="p-1 border"><select className="w-full bg-transparent outline-none" value={r.kategori} onChange={e=>updateRisiko(r.id, 'kategori', e.target.value)}><option value="">Kategori</option>{KATEGORI_RISIKO.map(k=><option key={k}>{k}</option>)}</select></td>
                                                            <td className="p-1 border"><input className="w-full bg-transparent outline-none" value={r.identifikasi.sumber} onChange={e=>updateRisiko(r.id, 'identifikasi.sumber', e.target.value)} /></td>
                                                            <td className="p-1 border"><input className="w-full bg-transparent outline-none" value={r.identifikasi.sebab} onChange={e=>updateRisiko(r.id, 'identifikasi.sebab', e.target.value)} /></td>
                                                            <td className="p-1 border text-center">{r.identifikasi.kode}</td>
                                                            <td className="p-1 border"><textarea className="w-full h-12 bg-transparent outline-none" value={r.identifikasi.risiko} onChange={e=>updateRisiko(r.id, 'identifikasi.risiko', e.target.value)} /></td>
                                                            <td className="p-1 border"><textarea className="w-full h-12 bg-transparent outline-none" value={r.identifikasi.dampak} onChange={e=>updateRisiko(r.id, 'identifikasi.dampak', e.target.value)} /></td>
                                                            <td className="p-1 border"><textarea className="w-full h-12 bg-transparent outline-none" value={r.identifikasi.pernyataan} onChange={e=>updateRisiko(r.id, 'identifikasi.pernyataan', e.target.value)} /></td>
                                                            <td className="p-1 border"><input className="w-full bg-transparent outline-none" value={r.analisa.pengendalian} onChange={e=>updateRisiko(r.id, 'analisa.pengendalian', e.target.value)} /></td>
                                                            <td className="p-1 border text-center"><input type="number" className="w-8 text-center bg-transparent outline-none" value={r.analisa.d} onChange={e=>updateRisiko(r.id, 'analisa.d', e.target.value)} /></td>
                                                            <td className="p-1 border text-center"><input type="number" className="w-8 text-center bg-transparent outline-none" value={r.analisa.k} onChange={e=>updateRisiko(r.id, 'analisa.k', e.target.value)} /></td>
                                                            <td className="p-1 border text-center"><input type="number" disabled={isKlinis(r.kategori)} className="w-8 text-center bg-transparent outline-none" value={isKlinis(r.kategori) ? '' : r.analisa.b} onChange={e=>updateRisiko(r.id, 'analisa.b', e.target.value)} /></td>
                                                            <td className="p-1 border text-center font-black">{r.analisa.skor}</td>
                                                            <td className="p-1 border"><select className="w-full bg-transparent text-[8px] outline-none" value={r.evaluasi.selera} onChange={e=>updateRisiko(r.id, 'evaluasi.selera', e.target.value)}><option>Diatas selera risiko</option><option>Dibawah selera risiko</option></select></td>
                                                            <td className="p-1 border text-center"><select className="w-full bg-transparent outline-none" value={r.evaluasi.perluPenanganan} onChange={e=>updateRisiko(r.id, 'evaluasi.perluPenanganan', e.target.value)}><option>Ya</option><option>Tidak</option></select></td>
                                                            <td className="p-1 border text-center"><button onClick={()=>handleAIGenerateRisks(r.id)} className="bg-yellow-100 p-2 rounded-full"><Icon name="Sparkles" /></button></td>
                                                        </tr>
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* STEP 3: RCA */}
                            {step === 3 && (
                                <div className="space-y-6">
                                    <h2 className="text-3xl font-black">Langkah 3: RCA (5-Why)</h2>
                                    {risiko.map(r => (
                                        <div key={r.id} className="bg-white p-8 rounded-3xl shadow-xl border mb-6">
                                            <div className="flex justify-between items-start mb-4">
                                                <div>
                                                    <span className="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-bold">{r.identifikasi.kode}</span>
                                                    <h3 className="text-xl font-black mt-2">{r.identifikasi.risiko || '(Kosong)'}</h3>
                                                </div>
                                                <button onClick={()=>handleAIRCA(r.id)} className="bg-blue-600 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2"><Icon name="BrainCircuit" /> RCA AI</button>
                                            </div>
                                            <div className="grid grid-cols-5 gap-4 mb-6">
                                                {[1,2,3,4,5].map(n => (
                                                    <textarea key={n} className="p-3 border rounded-xl h-24 text-xs bg-slate-50 outline-none" placeholder={`Why ${n}`} value={r.rca[`w${n}`]} onChange={e=>updateRisiko(r.id, `rca.w${n}`, e.target.value)} />
                                                ))}
                                            </div>
                                            <div className="bg-red-50 p-6 rounded-2xl border border-red-200 flex gap-6">
                                                <div className="flex-1">
                                                    <label className="text-[10px] font-black text-red-600">AKAR MASALAH</label>
                                                    <input className="w-full bg-transparent font-black text-lg outline-none" value={r.rca.akar} onChange={e=>updateRisiko(r.id, 'rca.akar', e.target.value)} />
                                                </div>
                                                <div className="w-64">
                                                    <label className="text-[10px] font-black text-slate-500">JENIS</label>
                                                    <input className="w-full bg-transparent font-bold outline-none border-b border-slate-300" value={r.rca.jenis} onChange={e=>updateRisiko(r.id, 'rca.jenis', e.target.value)} />
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {/* STEP 4: PROFIL (FORM 2) */}
                            {step === 4 && (
                                <div className="space-y-6">
                                    <h2 className="text-3xl font-black">Form 2: Profil & RTP</h2>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-xl custom-scrollbar">
                                        <table className="w-full text-[10px] border-collapse min-w-[1500px]">
                                            <thead className="bg-slate-800 text-white font-bold sticky top-0">
                                                <tr>
                                                    <th className="p-2 border" rowSpan="2">Unit</th><th className="p-2 border" rowSpan="2">Kode</th><th className="p-2 border" rowSpan="2">Risiko</th><th className="p-2 border" rowSpan="2">Akar Masalah</th><th colSpan="4" className="border">Inherent</th><th colSpan="4" className="border">RTP</th><th colSpan="4" className="border">Residual</th><th className="p-2 border" rowSpan="2">Pemilik</th><th className="p-2 border" rowSpan="2">AI</th>
                                                </tr>
                                                <tr className="bg-slate-700 text-[8px]"><th>D</th><th>K</th><th>B*</th><th>Skor</th><th>Opsi</th><th>Uraian</th><th>Waktu</th><th>Biaya</th><th>D</th><th>K</th><th>B*</th><th>Skor</th></tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map(r => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRtpOptions?.length > 0 && (
                                                            <tr>
                                                                <td colSpan="17" className="p-4 bg-emerald-50">
                                                                    <div className="grid md:grid-cols-3 gap-4">
                                                                        {r.aiRtpOptions.map((opt, idx) => (
                                                                            <div key={idx} onClick={()=>applyAiRtpOption(r.id, opt)} className="bg-white p-3 rounded-xl border cursor-pointer hover:shadow">
                                                                                <p className="font-bold">Opsi {idx+1}: {opt.opsi}</p><p className="italic text-slate-600">{opt.uraian}</p>
                                                                            </div>
                                                                        ))}
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        )}
                                                        <tr className="hover:bg-slate-50">
                                                            <td className="p-1 border">{konteks.find(c=>c.id===r.idKonteks)?.rincian}</td>
                                                            <td className="p-2 border text-center font-mono">{r.identifikasi.kode}</td>
                                                            <td className="p-2 border">{r.identifikasi.risiko}</td>
                                                            <td className="p-2 border text-red-700">{r.rca.akar}</td>
                                                            <td className="p-2 border text-center">{r.analisa.d}</td>
                                                            <td className="p-2 border text-center">{r.analisa.k}</td>
                                                            <td className="p-2 border text-center">*</td>
                                                            <td className="p-2 border text-center font-black">{r.analisa.skor}</td>
                                                            <td className="p-1 border"><select className="w-full bg-transparent outline-none" value={r.rtp.opsi} onChange={e=>updateRisiko(r.id, 'rtp.opsi', e.target.value)}>{OPSI_PENANGANAN.map(o=><option key={o}>{o}</option>)}</select></td>
                                                            <td className="p-1 border"><textarea className="w-full h-12 bg-transparent outline-none" value={r.rtp.uraian} onChange={e=>updateRisiko(r.id, 'rtp.uraian', e.target.value)} /></td>
                                                            <td className="p-1 border"><input className="w-full text-center bg-transparent outline-none" value={r.rtp.waktu} onChange={e=>updateRisiko(r.id, 'rtp.waktu', e.target.value)} /></td>
                                                            <td className="p-1 border"><select className="w-full bg-transparent outline-none" value={r.rtp.biaya} onChange={e=>updateRisiko(r.id, 'rtp.biaya', e.target.value)}><option>Retensi</option><option>Transfer</option></select></td>
                                                            <td className="p-1 border text-center"><input type="number" className="w-8 text-center bg-transparent outline-none" value={r.rtp.rd} onChange={e=>updateRisiko(r.id, 'rtp.rd', e.target.value)} /></td>
                                                            <td className="p-1 border text-center"><input type="number" className="w-8 text-center bg-transparent outline-none" value={r.rtp.rk} onChange={e=>updateRisiko(r.id, 'rtp.rk', e.target.value)} /></td>
                                                            <td className="p-1 border text-center">*</td>
                                                            <td className="p-2 border text-center font-black">{r.rtp.rskor}</td>
                                                            <td className="p-1 border"><input className="w-full bg-transparent outline-none text-center" value={r.rtp.pemilik} onChange={e=>updateRisiko(r.id, 'rtp.pemilik', e.target.value)} /></td>
                                                            <td className="p-1 border text-center"><button onClick={()=>handleAIRTP(r.id)} className="bg-emerald-100 p-2 rounded-full"><Icon name="Sparkles" /></button></td>
                                                        </tr>
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* STEP 6: MONITORING */}
                            {step === 6 && (
                                <div className="space-y-6">
                                    <h2 className="text-3xl font-black">Form 3: Pemantauan</h2>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-xl custom-scrollbar">
                                        <table className="w-full text-xs border-collapse min-w-[1200px]">
                                            <thead className="bg-slate-800 text-white font-bold sticky top-0">
                                                <tr>
                                                    <th className="p-3 border">Kode</th><th className="p-3 border">Risiko</th><th className="p-3 border">Realisasi</th><th className="p-3 border">Hambatan</th><th className="p-3 border">Usulan (RTL)</th><th className="p-3 border">Skor Res</th><th className="p-3 border">Trend</th><th className="p-3 border">Efektivitas</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map(r => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRealisasiOptions?.length > 0 && <tr><td colSpan="8" className="p-4 bg-blue-50"><div className="grid grid-cols-3 gap-2">{r.aiRealisasiOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'monitoring.realisasi', opt.teks); updateRisiko(r.id, 'aiRealisasiOptions', []);}} className="p-2 bg-white border rounded cursor-pointer text-[10px]">{opt.teks}</div>)}</div></td></tr>}
                                                        {r.aiHambatanOptions?.length > 0 && <tr><td colSpan="8" className="p-4 bg-red-50"><div className="grid grid-cols-3 gap-2">{r.aiHambatanOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'monitoring.hambatan', opt.teks); updateRisiko(r.id, 'aiHambatanOptions', []);}} className="p-2 bg-white border rounded cursor-pointer text-[10px]">{opt.teks}</div>)}</div></td></tr>}
                                                        {r.aiUsulanOptions?.length > 0 && <tr><td colSpan="8" className="p-4 bg-emerald-50"><div className="grid grid-cols-3 gap-2">{r.aiUsulanOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'monitoring.usulan', opt.teks); updateRisiko(r.id, 'aiUsulanOptions', []);}} className="p-2 bg-white border rounded cursor-pointer text-[10px]">{opt.teks}</div>)}</div></td></tr>}
                                                        <tr className="hover:bg-slate-50">
                                                            <td className="p-2 border font-black text-center">{r.identifikasi.kode}</td>
                                                            <td className="p-2 border">{r.identifikasi.risiko}</td>
                                                            <td className="p-2 border"><textarea className="w-full outline-none bg-transparent" value={r.monitoring.realisasi} onChange={e=>updateRisiko(r.id, 'monitoring.realisasi', e.target.value)} /><button onClick={()=>handleAIMonitoring(r.id, 'Realisasi')} className="text-[9px] bg-blue-100 px-2 py-1 rounded">AI Realisasi</button></td>
                                                            <td className="p-2 border"><textarea className="w-full outline-none bg-transparent" value={r.monitoring.hambatan} onChange={e=>updateRisiko(r.id, 'monitoring.hambatan', e.target.value)} /><button onClick={()=>handleAIMonitoring(r.id, 'Hambatan')} className="text-[9px] bg-red-100 px-2 py-1 rounded">AI Hambatan</button></td>
                                                            <td className="p-2 border"><textarea className="w-full outline-none bg-transparent" value={r.monitoring.usulan} onChange={e=>updateRisiko(r.id, 'monitoring.usulan', e.target.value)} /><button onClick={()=>handleAIMonitoring(r.id, 'Usulan')} className="text-[9px] bg-emerald-100 px-2 py-1 rounded">AI Usulan</button></td>
                                                            <td className="p-2 border text-center font-black">{r.rtp.rskor}</td>
                                                            <td className="p-2 border text-center uppercase">{r.monitoring.trend}</td>
                                                            <td className="p-2 border text-center">{r.monitoring.efektivitas}</td>
                                                        </tr>
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* STEP 7: PRINT */}
                            {step === 7 && (
                                <div className="space-y-6">
                                    <div className="bg-emerald-900 p-8 rounded-3xl flex justify-between items-center text-white no-print">
                                        <h2 className="text-2xl font-black">Export Matriks</h2>
                                        <div className="flex gap-4 items-center">
                                            <select className="p-3 text-slate-900 font-bold rounded-xl outline-none" value={printFormType} onChange={e=>setPrintFormType(e.target.value)}>
                                                <option value="SEMUA">Semua Form & Lampiran</option>
                                                <option value="REGISTER">Form 1 (Register)</option>
                                                <option value="PROFIL">Form 2 (Profil & RTP)</option>
                                                <option value="PEMANTAUAN">Form 3 (Pemantauan)</option>
                                                <option value="RCA">RCA (5-Why)</option>
                                                <option value="LAMPIRAN">Lampiran Kriteria</option>
                                            </select>
                                            <button onClick={handlePrint} className="bg-white text-emerald-900 px-8 py-3 rounded-2xl font-black flex items-center gap-2"><Icon name="Printer" /> CETAK PDF</button>
                                        </div>
                                    </div>
                                    <div className="print-area text-black">
                                        <p className="text-center font-bold text-slate-400 no-print">Tampilan Pratinjau (Layout disesuaikan saat Ctrl+P)</p>
                                        
                                        {(printFormType === 'SEMUA' || printFormType === 'REGISTER') && (
                                        <div className="bg-white p-6 border border-black print-section mt-4">
                                            <h1 className="text-lg font-black text-center uppercase">FORM 1: REGISTER RISIKO TERINTEGRASI</h1><p className="text-center text-[10px] font-bold mb-6">{profil.faskes} - {profil.tahun}</p>
                                            <table className="w-full border-black border-collapse">
                                                <thead className="bg-slate-100 text-center font-bold text-[8px]">
                                                    <tr>
                                                        <th className="border border-black">No</th><th className="border border-black">Kategori</th><th className="border border-black">Sumber</th><th className="border border-black">Sebab</th><th className="border border-black">Kode</th><th className="border border-black">Risiko</th><th className="border border-black">Dampak</th><th className="border border-black">Kontrol</th><th className="border border-black w-3">D</th><th className="border border-black w-3">K</th><th className="border border-black w-3">B*</th><th className="border border-black">Skor</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="text-[8px]">
                                                    {risiko.map((r, i) => (
                                                        <tr key={i}>
                                                            <td className="text-center border border-black">{i+1}</td><td className="border border-black">{r.kategori}</td><td className="border border-black">{r.identifikasi.sumber}</td><td className="border border-black">{r.identifikasi.sebab}</td><td className="text-center border border-black">{r.identifikasi.kode}</td><td className="border border-black">{r.identifikasi.risiko}</td><td className="border border-black">{r.identifikasi.dampak}</td><td className="border border-black">{r.analisa.pengendalian}</td><td className="text-center border border-black">{r.analisa.d}</td><td className="text-center border border-black">{r.analisa.k}</td><td className="text-center border border-black">{isKlinis(r.kategori)?'-':r.analisa.b}</td><td className="text-center font-bold border border-black">{r.analisa.skor}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                        )}
                                        
                                        {(printFormType === 'SEMUA' || printFormType === 'PROFIL') && (
                                        <div className="bg-white p-6 border border-black print-section mt-4">
                                            <h1 className="text-lg font-black text-center uppercase">FORM 2: PROFIL RISIKO & PENANGANAN</h1><p className="text-center text-[10px] font-bold mb-6">{profil.faskes} - {profil.tahun}</p>
                                            <table className="w-full border-black border-collapse">
                                                <thead className="bg-slate-100 text-center font-bold text-[8px]">
                                                    <tr><th className="border border-black">Kode</th><th className="border border-black">Risiko</th><th className="border border-black">Akar (RCA)</th><th className="border border-black">Skor Awal</th><th className="border border-black">Opsi RTP</th><th className="border border-black">Uraian</th><th className="border border-black">Biaya</th><th className="border border-black">Skor Target</th><th className="border border-black">Pemilik</th></tr>
                                                </thead>
                                                <tbody className="text-[8px]">
                                                    {risiko.filter(r=>r.evaluasi.perluPenanganan==='Ya').map((r, i) => (
                                                        <tr key={i}>
                                                            <td className="text-center border border-black">{r.identifikasi.kode}</td><td className="border border-black">{r.identifikasi.risiko}</td><td className="border border-black text-red-800">{r.rca.akar}</td><td className="text-center font-bold border border-black">{r.analisa.skor}</td><td className="border border-black">{r.rtp.opsi}</td><td className="border border-black">{r.rtp.uraian}</td><td className="border border-black">{r.rtp.biaya}</td><td className="text-center font-bold border border-black">{r.rtp.rskor}</td><td className="border border-black">{r.rtp.pemilik}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                        )}

                                        {(printFormType === 'SEMUA' || printFormType === 'PEMANTAUAN') && (
                                        <div className="bg-white p-6 border border-black print-section mt-4">
                                            <h1 className="text-lg font-black text-center uppercase">FORM 3: PEMANTAUAN RISIKO</h1><p className="text-center text-[10px] font-bold mb-6">{profil.faskes} - {profil.tahun}</p>
                                            <table className="w-full border-black border-collapse">
                                                <thead className="bg-slate-100 text-center font-bold text-[8px]">
                                                    <tr><th className="border border-black">Kode</th><th className="border border-black">Risiko</th><th className="border border-black">Realisasi</th><th className="border border-black">Hambatan</th><th className="border border-black">Usulan (RTL)</th><th className="border border-black">Trend</th><th className="border border-black">Efektivitas</th></tr>
                                                </thead>
                                                <tbody className="text-[8px]">
                                                    {risiko.filter(r=>r.evaluasi.perluPenanganan==='Ya').map((r, i) => (
                                                        <tr key={i}>
                                                            <td className="text-center border border-black">{r.identifikasi.kode}</td><td className="border border-black">{r.identifikasi.risiko}</td><td className="border border-black">{r.monitoring.realisasi}</td><td className="border border-black">{r.monitoring.hambatan}</td><td className="border border-black">{r.monitoring.usulan}</td><td className="text-center border border-black uppercase">{r.monitoring.trend}</td><td className="text-center border border-black">{r.monitoring.efektivitas}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                        )}
                                        
                                        {(printFormType === 'SEMUA' || printFormType === 'RCA' || printFormType === 'LAMPIRAN') && (
                                            <div className="text-center mt-10 p-10 border border-slate-300 text-slate-500 font-bold no-print">Format Lampiran dan RCA persis mengikuti data di atas. Klik Cetak PDF untuk melihat layout lengkapnya.</div>
                                        )}
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

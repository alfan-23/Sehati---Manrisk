<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMR AI Pro - Manajemen Risiko</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #0f172a; overflow-x: hidden; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            body, html, #root, .flex, .overflow-y-auto, .overflow-x-hidden, main, .min-h-screen { display: block !important; height: auto !important; overflow: visible !important; background: white !important; }
            .no-print, aside, header, #userInfoFloating { display: none !important; }
            table { font-size: 7px !important; width: 100% !important; border-collapse: collapse; }
            th, td { border: 1px solid black !important; padding: 4px !important; }
        }
        .input-inline { width: 100%; background: transparent; border: none; outline: none; padding: 4px; border-bottom: 1px solid #e2e8f0; }
        .input-inline:focus { border-bottom: 2px solid #10b981; background: #f0fdf4; }
        .no-select { user-select: none; }
    </style>
</head>
<body class="selection:bg-emerald-100">

    <div id="mainAppWrapper" class="w-full min-h-screen no-select relative">
        <div id="userInfoFloating" class="fixed top-4 right-4 z-[100] bg-white text-slate-800 px-4 py-2 rounded-full text-xs font-bold shadow-lg border border-emerald-200 flex items-center gap-2 no-print">
            <i class="fas fa-shield-alt text-emerald-600"></i> <span class="text-slate-700 uppercase">Akses Portal Terenkripsi</span>
        </div>
        <div id="root"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const keyFromUrl = urlParams.get('key');
        if (keyFromUrl) {
            sessionStorage.setItem('sehati_api_key', keyFromUrl);
            const cleanUrl = window.location.protocol + "//" + window.location.host + window.location.pathname;
            window.history.replaceState({path: cleanUrl}, '', cleanUrl);
        }
    </script>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            return <i className={`fas fa-${name === 'Building2' ? 'building' : name === 'AlertTriangle' ? 'exclamation-triangle' : name === 'Target' ? 'bullseye' : name === 'Search' ? 'search' : name === 'Printer' ? 'print' : name === 'BrainCircuit' ? 'brain' : name === 'Save' ? 'save' : name === 'Upload' ? 'upload' : name === 'Activity' ? 'chart-line' : name === 'Sparkles' ? 'wand-magic-sparkles' : name === 'Trash2' ? 'trash' : name === 'ChevronLeft' ? 'chevron-left' : name === 'ChevronRight' ? 'chevron-right' : 'circle'} ${className}`}></i>;
        };

        const ILP_DATABASE = {
            "KLASTER 1: MANAJEMEN": { "Penyelenggaraan Manajemen": { "Perencanaan (P1)": ["Membentuk Tim", "Analisis Situasi", "Perumusan Masalah", "Penyusunan RUK/RPK"], "Pengawasan (P3)": ["Audit Internal", "Penilaian Kinerja"] } },
            "KLASTER 2: IBU DAN ANAK": { "Kes Ibu Hamil": { "ANC Terpadu": ["Pemeriksaan Kehamilan", "Skrining TBC"] }, "Kes Balita": { "Imunisasi": ["Imunisasi Dasar", "BIAS"] } },
            "KLASTER 3: DEWASA & LANSIA": { "Kesehatan Dewasa": { "Skrining PTM": ["Skrining Obesitas", "Skrining DM & Jantung", "Skrining Jiwa"] } }
        };
        const KATEGORI_RISIKO = ["Operasional", "Klinis / Keselamatan Pasien", "Kepatuhan", "Strategis", "Kebijakan", "Reputasi", "Fraud", "Legal"];
        const OPSI_PENANGANAN = ["Hindari risiko", "Cegah kerugian", "Reduksi kerugian", "Segregasi", "Contractual Transfer"];

        const getTingkat = (skor) => {
            if (skor >= 20) return { label: 'SANGAT TINGGI' }; if (skor >= 15) return { label: 'TINGGI' };
            if (skor >= 8) return { label: 'SEDANG' }; if (skor >= 4) return { label: 'RENDAH' }; return { label: 'SANGAT RENDAH' };
        };
        const generateKode = (kategori, index) => `${kategori ? kategori.substring(0, 3).toUpperCase() : 'RSK'}-${String(index).padStart(2, '0')}`;

        // PEMBARUAN: FUNGSI API CALL YANG LEBIH CEPAT DAN STABIL
        const callGeminiJson = async (prompt, schemaFormat, userApiKey, activeModel) => {
            if (!userApiKey) throw new Error("API Key belum disinkronisasi.");
            const modelToUse = activeModel || 'gemini-1.5-flash';
            
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelToUse}:generateContent?key=${userApiKey}`, { 
                method: 'POST', headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ contents: [{ parts: [{ text: `Berikan hasil JSON valid.\n\nSKEMA:\n${JSON.stringify(schemaFormat)}\n\nPERINTAH:\n${prompt}` }] }]})
            });
            
            if (!res.ok) {
                if(res.status === 429) throw new Error("Server Sibuk (Rate Limit). Tunggu sebentar.");
                throw new Error("Gagal memproses data dengan AI.");
            }
            
            const data = await res.json();
            let cleanJson = data.candidates[0].content.parts[0].text.replace(/```json/gi, '').replace(/```/g, '').trim();
            return JSON.parse(cleanJson); 
        };

        function App() {
            const [step, setStep] = useState(1);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [toast, setToast] = useState("");
            
            const [apiKey, setApiKey] = useState(() => sessionStorage.getItem('sehati_api_key') || localStorage.getItem('simr_key') || '');
            const [activeModel, setActiveModel] = useState('Memuat Model...');

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 4000); };
            const handlePrint = () => { setTimeout(() => { window.print(); }, 1000); };
            const isKlinis = (kat) => kat === 'Klinis / Keselamatan Pasien';

            // PEMBARUAN: AUTO-DETECT MODEL (SEPERTI IMP)
            useEffect(() => {
                const verifyKey = async () => {
                    if (!apiKey) { setActiveModel("API Key Kosong"); return; }
                    try {
                        const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                        if (!res.ok) throw new Error();
                        const data = await res.json();
                        const validModels = data.models.filter(m => m.supportedGenerationMethods?.includes("generateContent") && m.name.includes("gemini"));
                        let selected = validModels.find(m => m.name.includes('1.5-flash')) || validModels[0];
                        setActiveModel(selected.name.replace('models/', ''));
                    } catch (e) {
                        setActiveModel("Error Koneksi API");
                    }
                };
                verifyKey();
            }, [apiKey]);

            const [profil, setProfil] = useState({ faskes: 'Puskesmas', pimpinan: 'dr. Pimpinan', tahun: '2026', tanggal: new Date().toISOString().split('T')[0] });
            const [konteks, setKonteks] = useState([{ id: 1, klaster: 'KLASTER 1: MANAJEMEN', program: 'Penyelenggaraan Manajemen', kegiatan: 'Perencanaan (P1)', rincian: 'Penyusunan RUK/RPK', tujuan: '', sasaran: '', aiGoalOptions: [] }]);
            const [risiko, setRisiko] = useState([{
                id: 1, idKonteks: 1, kategori: 'Operasional', identifikasi: { sumber: '', sebab: '', kode: 'OPE-01', risiko: '', dampak: '', pernyataan: '' },
                analisa: { pengendalian: '', d: 1, k: 1, b: 1, skor: 1, tingkat: 'SANGAT RENDAH' }, evaluasi: { selera: 'Dibawah selera risiko', perluPenanganan: 'Tidak' },
                rca: { w1: '', w2: '', w3: '', w4: '', w5: '', akar: '', jenis: '' },
                rtp: { opsi: '', biaya: '', uraian: '', waktu: '', rd: 1, rk: 1, rb: 1, rskor: 1, pemilik: '', pengelola: '' },
                monitoring: { realisasi: '', hambatan: '', usulan: '', trend: 'Tetap', efektivitas: '' }, aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []
            }]);

            const fileInputRef = useRef(null);

            const handleSaveDraft = () => {
                const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify({ profil, konteks, risiko })]));
                a.download = `draft-manrisk.txt`; a.click(); showToast("✅ Draft disimpan.");
            };
            const handleLoadDraft = (e) => {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if (data.profil) setProfil(data.profil); if (data.konteks) setKonteks(data.konteks); if (data.risiko) setRisiko(data.risiko);
                        showToast("✅ Draft dimuat.");
                    } catch (error) { showToast("❌ File rusak."); }
                }; reader.readAsText(file); e.target.value = ""; 
            };

            const updateRisiko = (id, path, value) => {
                setRisiko(prev => prev.map((r, index) => {
                    if (r.id !== id) return r;
                    const newR = JSON.parse(JSON.stringify(r)); 
                    const parts = path.split('.'); let curr = newR;
                    for (let i = 0; i < parts.length - 1; i++) curr = curr[parts[i]];
                    curr[parts[parts.length - 1]] = value;

                    if (path === 'kategori') { newR.identifikasi.kode = generateKode(value, index + 1); if(isKlinis(value)) newR.analisa.b = 1; }
                    if (path.includes('analisa')) {
                        newR.analisa.skor = (parseInt(newR.analisa.d) || 0) * (parseInt(newR.analisa.k) || 0);
                        newR.evaluasi.selera = newR.analisa.skor >= 8 ? "Diatas" : "Dibawah"; newR.evaluasi.perluPenanganan = newR.analisa.skor >= 8 ? "Ya" : "Tidak";
                    }
                    if (path.includes('rtp')) newR.rtp.rskor = (parseInt(newR.rtp.rd) || 0) * (parseInt(newR.rtp.rk) || 0);
                    return newR;
                }));
            };

            const handleAIGenerateRisks = async (rId) => {
                const r = risiko.find(x => x.id === rId); const c = konteks.find(ctx => ctx.id === r.idKonteks);
                if(!r.kategori) return showToast("Pilih kategori risiko dahulu.");
                showToast("⚡ AI memproses identifikasi risiko...");
                try {
                    const res = await callGeminiJson(`Buat 3 opsi identifikasi risiko kategori "${r.kategori}" kegiatan "${c?.rincian}".`, { options: [{ sumber: "Internal", sebab: "string", risiko: "string", dampak: "string", pernyataan: "Sebab->Risiko->Dampak", d: "1-5", k: "1-5", b: "1-5", pengendalian: "string" }] }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRiskOptions: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIRCA = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.identifikasi.pernyataan) return showToast("Isi pernyataan risiko dahulu.");
                showToast("⚡ AI menganalisis akar masalah...");
                try {
                    const res = await callGeminiJson(`Lakukan RCA 5-Why untuk risiko: "${r.identifikasi.pernyataan}".`, { rca: { w1: "string", w2: "string", w3: "string", w4: "string", w5: "string", akar: "string", jenis: "Man/Money/Material/Method/Machine" } }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, rca: res.rca } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIRTP = async (rId) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.rca.akar) return showToast("Lakukan RCA dahulu.");
                showToast("⚡ AI menyusun opsi penanganan...");
                try {
                    const res = await callGeminiJson(`Beri 3 saran penanganan mengatasi akar masalah: "${r.rca.akar}".`, { options: [{ opsi: "Reduksi kerugian", biaya: "Retensi", uraian: "string", waktu: "1 Bulan", rd: "1-5", rk: "1-5", pemilik: "Jabatan" }] }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRtpOptions: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            const handleAIMonitoring = async (rId, type) => {
                const r = risiko.find(x => x.id === rId);
                showToast(`⚡ AI menyusun ${type}...`);
                try {
                    let p = type === 'Realisasi' ? `3 tindakan nyata untuk: "${r.rtp.uraian}".` : type === 'Hambatan' ? `3 hambatan saat melakukan: "${r.monitoring.realisasi}".` : `3 usulan mengatasi hambatan: "${r.monitoring.hambatan}".`;
                    const res = await callGeminiJson(p, { options: [{ teks: "string" }] }, apiKey, activeModel);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, [`ai${type}Options`]: res.options } : item));
                } catch (e) { showToast(`❌ Gagal: ${e.message}`); }
            };

            return (
                <div className="flex min-h-screen">
                    {toast && <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl font-bold animate-pulse">{toast}</div>}
                    
                    <aside className={`no-print ${isSidebarOpen ? 'w-64' : 'w-20'} bg-slate-900 text-slate-400 flex flex-col transition-all duration-300 h-screen sticky top-0 shrink-0 z-50`}>
                        <div className="p-6 text-white font-black text-xl flex items-center justify-between border-b border-slate-800">
                            <div className="flex items-center gap-3">
                                <div className="bg-emerald-500 p-2 rounded-lg text-slate-900"><Icon name="BrainCircuit" /></div>
                                {isSidebarOpen && <span>MANRISK</span>}
                            </div>
                            <button onClick={() => setIsSidebarOpen(!isSidebarOpen)} className="text-slate-500 hover:text-white"><Icon name={isSidebarOpen ? "ChevronLeft" : "ChevronRight"} /></button>
                        </div>
                        <nav className="flex-1 px-3 py-6 space-y-2 overflow-y-auto">
                            {[{ id: 1, label: 'Konteks ILP', icon: 'Building2' }, { id: 2, label: 'Register (F1)', icon: 'AlertTriangle' }, { id: 3, label: 'RCA (5-Why)', icon: 'Search' }, { id: 4, label: 'Profil (F2)', icon: 'Target' }, { id: 6, label: 'Monitoring (F3)', icon: 'Activity' }, { id: 7, label: 'Cetak PDF', icon: 'Printer' }].map(m => (
                                <button key={m.id} onClick={() => setStep(m.id)} className={`w-full flex items-center gap-4 p-3 rounded-xl transition-all ${step === m.id ? 'bg-emerald-600 text-white' : 'hover:bg-slate-800'}`}>
                                    <Icon name={m.icon} />{isSidebarOpen && <span className="text-sm font-semibold">{m.label}</span>}
                                </button>
                            ))}
                            <hr className="border-slate-800 my-4 mx-3" />
                            <button onClick={handleSaveDraft} className="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-blue-400"><Icon name="Save" />{isSidebarOpen && <span className="text-sm font-semibold">Simpan Data (.txt)</span>}</button>
                            <button onClick={() => fileInputRef.current.click()} className="w-full flex items-center gap-4 p-3 rounded-xl hover:bg-slate-800 text-yellow-400"><Icon name="Upload" />{isSidebarOpen && <span className="text-sm font-semibold">Muat Data (.txt)</span>}</button>
                            <input type="file" accept=".txt" ref={fileInputRef} onChange={handleLoadDraft} className="hidden" />
                        </nav>
                        <div className="p-4 bg-slate-950 border-t border-slate-800 shrink-0 text-center">
                            {isSidebarOpen && <p className="text-[10px] text-emerald-500 font-mono tracking-tighter">Model: {activeModel}</p>}
                        </div>
                    </aside>
                    
                    <main className="flex-1 p-4 md:p-8 bg-slate-100 overflow-x-hidden">
                        <header className="mb-6 flex justify-between items-center no-print">
                            <h2 className="text-sm font-bold text-slate-400 uppercase tracking-widest">Langkah {step}</h2>
                            <div className="bg-white px-4 py-2 rounded-xl text-xs font-bold text-emerald-600 shadow-sm border">{profil.faskes}</div>
                        </header>
                        
                        <div className="max-w-[1700px] mx-auto pb-24">
                            {step === 1 && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 md:p-8 rounded-3xl border-l-[8px] border-l-emerald-500 shadow-sm border">
                                        <h2 className="text-xl font-black mb-4">Profil Instansi</h2>
                                        <div className="grid md:grid-cols-4 gap-4">
                                            <div><label className="text-[10px] font-black text-slate-400">NAMA INSTANSI</label><input className="input-inline font-bold" value={profil.faskes} onChange={e=>setProfil({...profil, faskes: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">PIMPINAN</label><input className="input-inline font-bold" value={profil.pimpinan} onChange={e=>setProfil({...profil, pimpinan: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">TAHUN</label><input className="input-inline font-bold" value={profil.tahun} onChange={e=>setProfil({...profil, tahun: e.target.value})} /></div>
                                            <div><label className="text-[10px] font-black text-slate-400">TANGGAL</label><input type="date" className="input-inline font-bold" value={profil.tanggal} onChange={e=>setProfil({...profil, tanggal: e.target.value})} /></div>
                                        </div>
                                    </div>
                                    <div className="bg-white p-6 md:p-8 rounded-3xl shadow-sm border">
                                        <div className="flex justify-between items-center mb-6">
                                            <h2 className="text-xl font-black text-emerald-800">Hierarki ILP</h2>
                                            <button onClick={()=>setKonteks([...konteks, {id: Date.now(), klaster: '', program: '', kegiatan: '', rincian: '', tujuan: '', sasaran: '', aiGoalOptions: []}])} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow hover:bg-emerald-700">+ Tambah Unit</button>
                                        </div>
                                        {konteks.map(k => (
                                            <div key={k.id} className="border border-slate-200 p-4 bg-slate-50 mb-4 rounded-xl relative group">
                                                <button onClick={()=>setKonteks(konteks.filter(x=>x.id!==k.id))} className="absolute -right-2 -top-2 bg-red-500 text-white p-1.5 rounded-full shadow-md hover:bg-red-600"><Icon name="Trash2" className="w-3 h-3"/></button>
                                                <div className="grid md:grid-cols-3 gap-4 mb-4">
                                                    <div><label className="text-[10px] font-bold text-slate-500">Klaster / Area</label><input className="input-inline bg-white border rounded p-2" value={k.klaster} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, klaster: e.target.value}:x))} placeholder="Contoh: Klaster 1 Manajemen"/></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500">Program</label><input className="input-inline bg-white border rounded p-2" value={k.program} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, program: e.target.value}:x))} placeholder="Contoh: Penyelenggaraan Manajemen"/></div>
                                                    <div><label className="text-[10px] font-bold text-slate-500">Kegiatan Rincian</label><input className="input-inline bg-white border rounded p-2 text-emerald-700 font-bold" value={k.rincian} onChange={e=>setKonteks(konteks.map(x=>x.id===k.id?{...x, rincian: e.target.value}:x))} placeholder="Contoh: Penyusunan RUK"/></div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6">
                                    <div className="flex justify-between items-center"><h2 className="text-2xl font-black">Register (Form 1)</h2><button onClick={()=>setRisiko([...risiko, {id: Date.now(), idKonteks: '', kategori: '', identifikasi: { sumber: '', sebab: '', kode: '', risiko: '', dampak: '', pernyataan: '' }, analisa: { pengendalian: '', d: 1, k: 1, b: 1, skor: 1, tingkat: '' }, evaluasi: { selera: '', perluPenanganan: '' }, rca: { w1: '', w2: '', w3: '', w4: '', w5: '', akar: '', jenis: '' }, rtp: { opsi: '', biaya: '', uraian: '', waktu: '', rd: 1, rk: 1, rb: 1, rskor: 1, pemilik: '', pengelola: '' }, monitoring: { realisasi: '', hambatan: '', usulan: '', trend: '', efektivitas: '' }, aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []}])} className="bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm font-bold shadow">+ Baris</button></div>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-sm custom-scrollbar">
                                        <table className="w-full text-xs border-collapse min-w-[1500px]">
                                            <thead className="bg-slate-800 text-white font-bold">
                                                <tr><th className="p-3 border">Unit/Kegiatan</th><th className="p-3 border">Kategori</th><th className="p-3 border">Pernyataan Risiko</th><th className="p-3 border w-12">D</th><th className="p-3 border w-12">K</th><th className="p-3 border w-12">Skor</th><th className="p-3 border w-16">AI</th></tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map(r => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRiskOptions?.length > 0 && <tr><td colSpan="7" className="bg-emerald-50 p-4"><div className="grid grid-cols-3 gap-4">{r.aiRiskOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'identifikasi.pernyataan', opt.pernyataan); updateRisiko(r.id, 'analisa.d', opt.d); updateRisiko(r.id, 'analisa.k', opt.k); updateRisiko(r.id, 'aiRiskOptions', []);}} className="bg-white p-3 rounded border cursor-pointer hover:shadow-md"><p className="font-bold text-[10px] text-emerald-700 mb-1">Opsi {idx+1}:</p><p className="text-xs">{opt.pernyataan}</p></div>)}</div></td></tr>}
                                                        <tr className="hover:bg-slate-50">
                                                            <td className="p-2 border"><select className="w-full outline-none bg-transparent" value={r.idKonteks} onChange={e=>updateRisiko(r.id, 'idKonteks', parseInt(e.target.value))}><option value="">Pilih</option>{konteks.map(c=><option key={c.id} value={c.id}>{c.rincian}</option>)}</select></td>
                                                            <td className="p-2 border"><select className="w-full outline-none bg-transparent" value={r.kategori} onChange={e=>updateRisiko(r.id, 'kategori', e.target.value)}><option value="">Kategori</option>{KATEGORI_RISIKO.map(k=><option key={k}>{k}</option>)}</select></td>
                                                            <td className="p-2 border"><textarea className="w-full h-12 outline-none bg-transparent resize-none" value={r.identifikasi.pernyataan} onChange={e=>updateRisiko(r.id, 'identifikasi.pernyataan', e.target.value)} placeholder="Tuliskan Sebab -> Risiko -> Dampak" /></td>
                                                            <td className="p-2 border text-center"><input type="number" className="w-full text-center outline-none bg-transparent" value={r.analisa.d} onChange={e=>updateRisiko(r.id, 'analisa.d', e.target.value)} /></td>
                                                            <td className="p-2 border text-center"><input type="number" className="w-full text-center outline-none bg-transparent" value={r.analisa.k} onChange={e=>updateRisiko(r.id, 'analisa.k', e.target.value)} /></td>
                                                            <td className="p-2 border text-center font-black text-sm">{r.analisa.skor}</td>
                                                            <td className="p-2 border text-center"><button onClick={()=>handleAIGenerateRisks(r.id)} className="bg-yellow-100 text-yellow-700 p-2 rounded-full hover:bg-yellow-200"><Icon name="Sparkles" /></button></td>
                                                        </tr>
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-black">Langkah 3: RCA (5-Why)</h2>
                                    {risiko.map(r => (
                                        <div key={r.id} className="bg-white p-6 rounded-3xl shadow-sm border mb-4">
                                            <div className="flex justify-between items-center mb-4 border-b pb-4">
                                                <div><span className="bg-blue-100 text-blue-800 px-3 py-1 rounded-full text-[10px] font-bold">{r.identifikasi.kode || 'Draft'}</span><h3 className="text-sm font-bold mt-2">{r.identifikasi.pernyataan || 'Pernyataan risiko masih kosong...'}</h3></div>
                                                <button onClick={()=>handleAIRCA(r.id)} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2"><Icon name="BrainCircuit" /> RCA Otomatis</button>
                                            </div>
                                            <div className="grid grid-cols-5 gap-2 mb-4">
                                                {[1,2,3,4,5].map(n => <textarea key={n} className="p-2 border rounded-xl h-20 text-[10px] bg-slate-50 outline-none resize-none" placeholder={`Why ${n}`} value={r.rca[`w${n}`]} onChange={e=>updateRisiko(r.id, `rca.w${n}`, e.target.value)} />)}
                                            </div>
                                            <div className="bg-red-50 p-4 rounded-xl border border-red-200">
                                                <label className="text-[10px] font-black text-red-600">AKAR MASALAH (Root Cause)</label>
                                                <input className="w-full bg-transparent font-bold text-sm outline-none border-b border-red-300 pb-1 mt-1" value={r.rca.akar} onChange={e=>updateRisiko(r.id, 'rca.akar', e.target.value)} />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-black">Form 2: Profil & Penanganan (RTP)</h2>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-sm custom-scrollbar">
                                        <table className="w-full text-xs border-collapse min-w-[1200px]">
                                            <thead className="bg-slate-800 text-white font-bold">
                                                <tr><th className="p-3 border">Risiko & Akar Masalah</th><th className="p-3 border">Skor Awal</th><th className="p-3 border">Uraian Rencana Penanganan</th><th className="p-3 border w-12">D</th><th className="p-3 border w-12">K</th><th className="p-3 border w-16">Skor RTP</th><th className="p-3 border w-16">AI</th></tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map(r => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRtpOptions?.length > 0 && <tr><td colSpan="7" className="bg-blue-50 p-4"><div className="grid grid-cols-3 gap-4">{r.aiRtpOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'rtp.uraian', opt.uraian); updateRisiko(r.id, 'rtp.rd', opt.rd); updateRisiko(r.id, 'rtp.rk', opt.rk); updateRisiko(r.id, 'aiRtpOptions', []);}} className="bg-white p-3 rounded border cursor-pointer hover:shadow"><p className="font-bold text-[10px] text-blue-700 mb-1">Opsi {idx+1}:</p><p className="text-xs">{opt.uraian}</p></div>)}</div></td></tr>}
                                                        <tr className="hover:bg-slate-50">
                                                            <td className="p-3 border"><p className="text-slate-500 mb-1">{r.identifikasi.pernyataan}</p><p className="font-bold text-red-700">Akar: {r.rca.akar}</p></td>
                                                            <td className="p-3 border text-center font-black text-lg text-slate-400">{r.analisa.skor}</td>
                                                            <td className="p-3 border"><textarea className="w-full h-16 outline-none bg-transparent resize-none" value={r.rtp.uraian} onChange={e=>updateRisiko(r.id, 'rtp.uraian', e.target.value)} placeholder="Tuliskan Rencana Penanganan" /></td>
                                                            <td className="p-3 border text-center"><input type="number" className="w-full text-center outline-none bg-transparent" value={r.rtp.rd} onChange={e=>updateRisiko(r.id, 'rtp.rd', e.target.value)} /></td>
                                                            <td className="p-3 border text-center"><input type="number" className="w-full text-center outline-none bg-transparent" value={r.rtp.rk} onChange={e=>updateRisiko(r.id, 'rtp.rk', e.target.value)} /></td>
                                                            <td className="p-3 border text-center font-black text-lg text-emerald-600">{r.rtp.rskor}</td>
                                                            <td className="p-3 border text-center"><button onClick={()=>handleAIRTP(r.id)} className="bg-emerald-100 text-emerald-700 p-2 rounded-full hover:bg-emerald-200"><Icon name="Sparkles" /></button></td>
                                                        </tr>
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {step === 6 && (
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-black">Form 3: Monitoring</h2>
                                    <div className="overflow-x-auto bg-white rounded-3xl border shadow-sm custom-scrollbar">
                                        <table className="w-full text-xs border-collapse min-w-[1200px]">
                                            <thead className="bg-slate-800 text-white font-bold">
                                                <tr><th className="p-3 border">Risiko & Rencana</th><th className="p-3 border">Realisasi (Pelaksanaan)</th><th className="p-3 border">Hambatan</th><th className="p-3 border">Usulan RTL</th></tr>
                                            </thead>
                                            <tbody>
                                                {risiko.map(r => (
                                                    <React.Fragment key={r.id}>
                                                        {r.aiRealisasiOptions?.length > 0 && <tr><td colSpan="4" className="p-2 bg-blue-50"><div className="grid grid-cols-3 gap-2">{r.aiRealisasiOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'monitoring.realisasi', opt.teks); updateRisiko(r.id, 'aiRealisasiOptions', []);}} className="p-2 bg-white border rounded cursor-pointer text-[10px]">{opt.teks}</div>)}</div></td></tr>}
                                                        {r.aiHambatanOptions?.length > 0 && <tr><td colSpan="4" className="p-2 bg-red-50"><div className="grid grid-cols-3 gap-2">{r.aiHambatanOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'monitoring.hambatan', opt.teks); updateRisiko(r.id, 'aiHambatanOptions', []);}} className="p-2 bg-white border rounded cursor-pointer text-[10px]">{opt.teks}</div>)}</div></td></tr>}
                                                        {r.aiUsulanOptions?.length > 0 && <tr><td colSpan="4" className="p-2 bg-emerald-50"><div className="grid grid-cols-3 gap-2">{r.aiUsulanOptions.map((opt, idx) => <div key={idx} onClick={()=>{updateRisiko(r.id, 'monitoring.usulan', opt.teks); updateRisiko(r.id, 'aiUsulanOptions', []);}} className="p-2 bg-white border rounded cursor-pointer text-[10px]">{opt.teks}</div>)}</div></td></tr>}
                                                        <tr className="hover:bg-slate-50">
                                                            <td className="p-3 border"><p className="text-slate-500 mb-1">{r.identifikasi.pernyataan}</p><p className="font-bold text-emerald-700">RTP: {r.rtp.uraian}</p></td>
                                                            <td className="p-3 border"><textarea className="w-full h-16 outline-none bg-transparent resize-none" value={r.monitoring.realisasi} onChange={e=>updateRisiko(r.id, 'monitoring.realisasi', e.target.value)} /><button onClick={()=>handleAIMonitoring(r.id, 'Realisasi')} className="text-[9px] bg-blue-100 text-blue-800 px-2 py-1 rounded">Saran AI</button></td>
                                                            <td className="p-3 border"><textarea className="w-full h-16 outline-none bg-transparent resize-none" value={r.monitoring.hambatan} onChange={e=>updateRisiko(r.id, 'monitoring.hambatan', e.target.value)} /><button onClick={()=>handleAIMonitoring(r.id, 'Hambatan')} className="text-[9px] bg-red-100 text-red-800 px-2 py-1 rounded">Saran AI</button></td>
                                                            <td className="p-3 border"><textarea className="w-full h-16 outline-none bg-transparent resize-none" value={r.monitoring.usulan} onChange={e=>updateRisiko(r.id, 'monitoring.usulan', e.target.value)} /><button onClick={()=>handleAIMonitoring(r.id, 'Usulan')} className="text-[9px] bg-emerald-100 text-emerald-800 px-2 py-1 rounded">Saran AI</button></td>
                                                        </tr>
                                                    </React.Fragment>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {step === 7 && (
                                <div className="space-y-6">
                                    <div className="bg-emerald-900 p-8 rounded-3xl flex justify-between items-center text-white no-print">
                                        <h2 className="text-2xl font-black">Cetak Dokumen</h2>
                                        <button onClick={handlePrint} className="bg-white text-emerald-900 px-8 py-3 rounded-2xl font-black flex items-center gap-2"><Icon name="Printer" /> CETAK PDF / PRINT</button>
                                    </div>
                                    <div className="bg-white p-8 border border-slate-200">
                                        <h1 className="text-center font-bold text-lg">REGISTER MANAJEMEN RISIKO</h1>
                                        <p className="text-center text-sm mb-6">{profil.faskes} - {profil.tahun}</p>
                                        <table className="w-full text-xs border border-collapse">
                                            <thead><tr className="bg-slate-100"><th className="border border-black p-2">Kode</th><th className="border border-black p-2">Pernyataan Risiko</th><th className="border border-black p-2 w-10">D</th><th className="border border-black p-2 w-10">K</th><th className="border border-black p-2 w-12">Skor</th></tr></thead>
                                            <tbody>{risiko.map(r=><tr key={r.id}><td className="border border-black p-2 text-center">{r.identifikasi.kode}</td><td className="border border-black p-2">{r.identifikasi.pernyataan}</td><td className="border border-black p-2 text-center">{r.analisa.d}</td><td className="border border-black p-2 text-center">{r.analisa.k}</td><td className="border border-black p-2 text-center font-bold">{r.analisa.skor}</td></tr>)}</tbody>
                                        </table>
                                        <p className="text-center text-slate-400 mt-8 text-sm italic no-print">(Tekan tombol Cetak PDF di atas untuk melihat layout lengkap seluruh tabel Form 1, 2, dan 3)</p>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

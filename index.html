    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby0ZcYKoMyjtK-vy1qmfqia3Dcm5Xdkpuow2M9c95zvBAs7BFQwwsYoQCbn3cJX7sOIKQ/exec"; 

        function toggleAuthView(view) {
            const loginView = document.getElementById('loginFormView');
            const regView = document.getElementById('registerFormView');
            document.getElementById('loginError').classList.add('hidden');
            document.getElementById('regMessage').classList.add('hidden');

            if(view === 'register') {
                loginView.classList.replace('translate-x-0', '-translate-x-full');
                regView.classList.replace('translate-x-full', 'translate-x-0');
            } else {
                regView.classList.replace('translate-x-0', 'translate-x-full');
                loginView.classList.replace('-translate-x-full', 'translate-x-0');
            }
        }

        async function verifyLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const btn = document.getElementById('btnLogin');
            const err = document.getElementById('loginError');

            if(!email || !password) {
                err.innerText = "Email dan Password wajib diisi!"; err.classList.remove('hidden'); return;
            }

            btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i> Memeriksa...`;
            btn.disabled = true; err.classList.add('hidden');

            try {
                const response = await fetch(`${GAS_URL}?action=login&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
                const result = await response.json();

                if(result.status === 'success') {
                    // Buka Tirai & Tampilkan Info User
                    document.getElementById('loginOverlay').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loginOverlay').classList.add('hidden');
                        const app = document.getElementById('mainAppWrapper');
                        app.classList.remove('hidden');
                        void app.offsetWidth;
                        app.classList.remove('opacity-0');
                        
                        document.getElementById('userInfoFloating').classList.remove('hidden');
                        document.getElementById('displayUserName').innerText = result.name;
                        
                        if(result.sisaHari) {
                            const badgeHari = document.getElementById('displaySisaHari');
                            badgeHari.innerText = `${result.sisaHari} Hari`;
                            badgeHari.classList.remove('hidden');
                        }
                    }, 500);
                } else {
                    err.innerText = result.message || "Akses Ditolak"; err.classList.remove('hidden');
                }
            } catch (error) {
                err.innerText = "Koneksi gagal. Pastikan URL GAS sudah benar dan internet stabil."; err.classList.remove('hidden');
            } finally {
                btn.innerHTML = `<i class="fas fa-sign-in-alt"></i> Masuk SIMR Pro`; btn.disabled = false;
            }
        }

        async function registerAccount() {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const btn = document.getElementById('btnRegister');
            const msg = document.getElementById('regMessage');

            msg.className = "text-[11px] mt-3 py-2 px-2 rounded font-bold block";

            if(!name || !email || !password || password.length < 6) {
                msg.innerText = "Lengkapi data. Password min 6 karakter.";
                msg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-100'); return;
            }

            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Memproses...`;
            btn.disabled = true; msg.classList.add('hidden');

            try {
                const response = await fetch(`${GAS_URL}?action=register&email=${encodeURIComponent(email)}&name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`);
                const result = await response.json();

                if(result.status === 'success') {
                    msg.innerText = result.message;
                    msg.classList.add('bg-emerald-50', 'text-emerald-700', 'border', 'border-emerald-200');
                    document.getElementById('regName').value = ''; document.getElementById('regEmail').value = ''; document.getElementById('regPassword').value = '';
                } else {
                    msg.innerText = result.message;
                    msg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-100');
                }
            } catch (error) {
                msg.innerText = "Gagal terhubung.";
                msg.classList.add('bg-red-50', 'text-red-600', 'border', 'border-red-100');
            } finally {
                btn.innerHTML = `<i class="fas fa-paper-plane"></i> Kirim Pengajuan`; btn.disabled = false;
            }
        }
        
        // Anti klik kanan (Selektif)
        document.addEventListener('contextmenu', event => {
            if (event.target.closest('.no-select')) {
                event.preventDefault();
            }
        });
    </script>

        const OPSI_PENANGANAN = ["Hindari risiko", "Cegah kerugian", "Reduksi kerugian", "Segregasi", "Contractual Transfer"];

        const getTingkat = (skor) => {
            if (skor >= 20) return { label: 'SANGAT TINGGI', color: 'bg-red-600 text-white' };
            if (skor >= 15) return { label: 'TINGGI', color: 'bg-orange-500 text-white' };
            if (skor >= 8) return { label: 'SEDANG', color: 'bg-yellow-400 text-slate-900' };
            if (skor >= 4) return { label: 'RENDAH', color: 'bg-green-500 text-white' };
            return { label: 'SANGAT RENDAH', color: 'bg-blue-500 text-white' };
        };

        const generateKode = (kategori, index) => {
            const prefix = kategori ? kategori.substring(0, 3).toUpperCase() : 'RSK';
            return `${prefix}-${String(index).padStart(2, '0')}`;
        };

        // --- AI API ENGINE ---
        const callGeminiJson = async (prompt, schemaFormat, userApiKey) => {
            const apiKeyToUse = userApiKey || "";
            if (!apiKeyToUse) throw new Error("Mohon masukkan API Key Google Gemini Anda di menu samping.");

            // Daftar auto-fallback HANYA model flash (Model Pro dihilangkan)
            const modelsToTry = ['gemini-2.5-flash', 'gemini-1.5-flash-latest', 'gemini-1.5-flash'];

            const fullPrompt = `TUGAS: Anda adalah asisten pakar Manajemen Risiko Fasyankes. Berikan hasil HANYA dalam format JSON valid tanpa penjelasan apapun.\n\nSKEMA JSON:\n${JSON.stringify(schemaFormat, null, 2)}\n\nPERINTAH:\n${prompt}`;
            
            let lastError = "";
            let isRateLimited = false;

            for (const model of modelsToTry) {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKeyToUse}`;
                let delay = 1000;
                
                for (let retry = 0; retry < 3; retry++) { 
                    try {
                        const response = await fetch(url, { 
                            method: 'POST', 
                            headers: { 'Content-Type': 'application/json' }, 
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: fullPrompt }] }],
                                generationConfig: { temperature: 0.2 } 
                            })
                        });
                        
                        const data = await response.json();
                        
                        if (!response.ok) {
                            lastError = data.error?.message || `HTTP Error ${response.status}`;
                            
                            if (response.status === 400 && lastError.toLowerCase().includes("api key not valid")) {
                                throw new Error("API_KEY_INVALID"); 
                            }
                            if (response.status === 429) {
                                isRateLimited = true;
                                throw new Error("RATE_LIMIT");
                            }
                            if (response.status === 404) {
                                throw new Error("NOT_FOUND");
                            }
                            throw new Error(lastError);
                        }
                        
                        let textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (!textResponse) throw new Error("Respon AI kosong.");

                        window.dispatchEvent(new CustomEvent('model-detected', { detail: model }));
                        
                        let cleanJson = textResponse.replace(/```json/gi, '').replace(/```/g, '').trim();
                        const startObj = cleanJson.indexOf('{');
                        const startArr = cleanJson.indexOf('[');
                        const start = (startObj !== -1 && startArr !== -1) ? Math.min(startObj, startArr) : Math.max(startObj, startArr);
                        
                        const endObj = cleanJson.lastIndexOf('}');
                        const endArr = cleanJson.lastIndexOf(']');
                        const end = (endObj !== -1 && endArr !== -1) ? Math.max(endObj, endArr) : Math.max(endObj, endArr);
                        
                        if(start !== -1 && end !== -1) {
                            cleanJson = cleanJson.substring(start, end + 1);
                        }
                        
                        return JSON.parse(cleanJson); 
                    } catch (e) {
                        if (e.message === "API_KEY_INVALID") throw new Error("API Key tidak valid."); 
                        if (e.message === "NOT_FOUND") break; // Langsung lompat ke model berikutnya tanpa retry
                        
                        if (e.message === "RATE_LIMIT") {
                            lastError = "API sedang sibuk. Menunggu akses...";
                        } else {
                            lastError = e.message;
                        }
                        
                        if (retry < 2) { 
                            // Terhenti sesaat / jeda eksponensial menunggu akses API sesuai logika asli Anda
                            await new Promise(res => setTimeout(res, delay)); 
                            delay *= 2; 
                        }
                    }
                }
            }
            
            // Jika semua model gagal setelah proses jeda dan fallback
            if (isRateLimited) {
                throw new Error("Limit Quota / Server Sibuk. Mohon jeda 1 menit lalu klik tombol lagi.");
            }
            throw new Error(lastError || "Koneksi ke AI bermasalah.");
        };

        function App() {
            const [step, setStep] = useState(1);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [toast, setToast] = useState("");

            }, []);

            const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 6000); };

            const handlePrint = () => {

            // --- DATA STATES ---
            const [profil, setProfil] = useState({ faskes: 'Puskesmas Percontohan', pimpinan: 'dr. Nama Pimpinan', tahun: '2026', tanggal: new Date().toISOString().split('T')[0] });
            const [konteks, setKonteks] = useState([{

                    rtp: { opsi: 'Reduksi kerugian', biaya: 'Retensi', uraian: 'Pengajuan revisi anggaran BLUD untuk server', waktu: '1 bulan', rd: 2, rk: 2, rb: 5, rskor: 4, rtingkat: 'RENDAH', pemilik: 'PJ Mutu / Kepala Tata Usaha', pengelola: 'Tim IT' },
                    monitoring: { realisasi: 'Proposal sudah diajukan', hambatan: 'Menunggu persetujuan Dinkes', usulan: 'Audiensi langsung ke Dinkes', md: 2, mk: 2, mb: 5, mskor: 4, mtingkat: 'RENDAH', mselera: 'Dibawah selera risiko', trend: 'Turun', efektivitas: 'Efektif' },
                    aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []
                }

            const [printFormType, setPrintFormType] = useState('SEMUA');

            // --- FITUR SIMPAN & MUAT DRAFT ---
            const handleSaveDraft = () => {

            const handleLoadDraft = (e) => {

                reader.readAsText(file);
                e.target.value = ""; // Reset input after reading
            };

            const isKlinis = (kat) => kat === 'Klinis / Keselamatan Pasien';

            const updateRisiko = (id, path, value) => {
                setRisiko(prev => {
                    return prev.map((r, index) => {
                        if (r.id !== id) return r;
                        const newR = JSON.parse(JSON.stringify(r)); 
                        const parts = path.split('.');
                        let curr = newR;
                        
                        for (let i = 0; i < parts.length - 1; i++) curr = curr[parts[i]];
                        curr[parts[parts.length - 1]] = value;

                        if (path === 'kategori') {
                            newR.identifikasi.kode = generateKode(value, index + 1);
                            if(isKlinis(value)) newR.analisa.b = 1; 
                        }

                        let skorChanged = false;

                        if (path.includes('analisa')) {
                            newR.analisa.skor = (parseInt(newR.analisa.d) || 0) * (parseInt(newR.analisa.k) || 0);
                            newR.analisa.tingkat = getTingkat(newR.analisa.skor).label;
                            
                            if (newR.analisa.skor >= 8) {
                                newR.evaluasi.selera = "Diatas selera risiko";

                            } else {

                                newR.evaluasi.perluPenanganan = "Tidak";
                            }
                            skorChanged = true;
                        }
                        
                        if (path.includes('rtp') && (path.includes('rd') || path.includes('rk'))) {
                            newR.rtp.rskor = (parseInt(newR.rtp.rd) || 0) * (parseInt(newR.rtp.rk) || 0);
                            newR.rtp.rtingkat = getTingkat(newR.rtp.rskor).label;
                            skorChanged = true;

                        // AUTO UPDATE TREND DAN EFEKTIVITAS BERDASARKAN INHERENT VS RESIDUAL
                        if (skorChanged && newR.analisa.skor > 0 && newR.rtp.rskor > 0) {
                            if (newR.rtp.rskor < newR.analisa.skor) {
                                newR.monitoring.trend = "Turun";
                                newR.monitoring.efektivitas = "Efektif";
                            } else if (newR.rtp.rskor === newR.analisa.skor) {

                            } else {
                                newR.monitoring.trend = "Naik";
                                newR.monitoring.efektivitas = "Tidak Efektif";
                            }
                        }

                        return newR;
                    });
                });
            };

            const tambahRisiko = () => {
                const newId = Date.now();
                const idx = risiko.length + 1;
                setRisiko([...risiko, {
                    id: newId, idKonteks: '', kategori: '', area: '',
                    identifikasi: { sumber: '', sebab: '', kode: '', risiko: '', dampak: '', pernyataan: '' },
                    analisa: { pengendalian: '', d: 1, k: 1, b: 1, skor: 1, tingkat: 'SANGAT RENDAH' },

                    rca: { w1: '', w2: '', w3: '', w4: '', w5: '', akar: '', jenis: '' },
                    rtp: { opsi: '', biaya: '', uraian: '', waktu: '', rd: 1, rk: 1, rb: 1, rskor: 1, rtingkat: 'SANGAT RENDAH', pemilik: 'Kepala Unit / PJ Mutu', pengelola: '' },
                    monitoring: { realisasi: '', hambatan: '', usulan: '', md: 1, mk: 1, mb: 1, mskor: 1, mtingkat: 'SANGAT RENDAH', mselera: 'Dibawah selera risiko', trend: 'Tetap', efektivitas: '' },
                    aiRiskOptions: [], aiRtpOptions: [], aiRealisasiOptions: [], aiHambatanOptions: [], aiUsulanOptions: []
                }]);
            };

            const applyAiRiskOption = (rId, opt) => {
                setRisiko(prev => prev.map((r, index) => {
                    if (r.id !== rId) return r;

                    newR.kategori = opt.kategori || newR.kategori;
                    newR.identifikasi.kode = generateKode(newR.kategori, index + 1);

                    newR.identifikasi.sebab = opt.sebab;

                    newR.identifikasi.dampak = opt.dampak;

                        }
                    }

                    newR.aiRiskOptions = [];
                    return newR;
                }));
            };

            const applyAiRtpOption = (rId, opt) => {
                setRisiko(prev => prev.map((r) => {
                    if (r.id !== rId) return r;
                    const newR = JSON.parse(JSON.stringify(r));

                    newR.rtp.rskor = (parseInt(opt.rd) || 0) * (parseInt(opt.rk) || 0);

                    if (newR.analisa.skor > 0 && newR.rtp.rskor > 0) {
                        if (newR.rtp.rskor < newR.analisa.skor) {
                            newR.monitoring.trend = "Turun"; newR.monitoring.efektivitas = "Efektif";
                        } else if (newR.rtp.rskor === newR.analisa.skor) {

                        }
                    }
                    newR.aiRtpOptions = [];
                    return newR;
                }));
            };

            // --- AI ACTIONS ---

                try {

                    const res = await callGeminiJson(`Beri 3 variasi saran rencana penanganan risiko (RTP) untuk mengatasi akar masalah: "${r.rca.akar}" pada risiko "${r.identifikasi.risiko}". Buatlah opsi berbeda.`, schema, apiKey);
                    setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRtpOptions: res.options } : item));
                    showToast("✅ Berhasil. Silakan pilih saran RTP.");

            const handleAIMonitoring = async (rId, phase) => {
                const r = risiko.find(x => x.id === rId);
                if(!r.rtp.uraian) return showToast("⚠️ Lengkapi RTP (Langkah 4) terlebih dahulu!");

                try {
                    let prompt = "";
                    const schema = { options: [{ teks: "string" }] };
                    
                    if(phase === 'Realisasi') {
                        prompt = `Berikan 3 contoh opsi realisasi spesifik (tindakan nyata) berdasarkan rencana penanganan: "${r.rtp.uraian}" untuk mengatasi risiko "${r.identifikasi.risiko}".`;
                    } 
                    else if (phase === 'Hambatan') {
                        prompt = `Berikan 3 prediksi hambatan/kendala nyata yang sering muncul saat mencoba merealisasikan: "${r.monitoring.realisasi}".`;
                    }
                    else if (phase === 'Usulan') {
                        prompt = `Berikan 3 opsi usulan / Rencana Tindak Lanjut (RTL) spesifik untuk mengatasi hambatan: "${r.monitoring.hambatan}".`;
                    }
                    
                    const res = await callGeminiJson(prompt, schema, apiKey);
                    
                    if(phase === 'Realisasi') {
                        setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiRealisasiOptions: res.options, aiHambatanOptions: [], aiUsulanOptions: [] } : item));
                    } else if (phase === 'Hambatan') {
                        setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiHambatanOptions: res.options, aiRealisasiOptions: [], aiUsulanOptions: [] } : item));
                    } else {
                        setRisiko(prev => prev.map(item => item.id === rId ? { ...item, aiUsulanOptions: res.options, aiRealisasiOptions: [], aiHambatanOptions: [] } : item));
